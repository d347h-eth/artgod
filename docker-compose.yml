services:
    nats:
        image: nats:2.10
        command: ["-js", "-sd", "/data", "-m", "8222"]
        ports:
            - "4222:4222"
            - "8222:8222"
        volumes:
            - nats-data:/data

    natsbox:
        image: natsio/nats-box:latest
        command: ["sleep", "infinity"]
        depends_on:
            - nats

volumes:
    nats-data:
