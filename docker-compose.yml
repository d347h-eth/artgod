services:
    nats:
        image: nats:2.10
        command: ["-js", "-sd", "/data", "-m", "8222"]
        ports:
            - "4222:4222"
            - "8222:8222"
        volumes:
            - nats-data:/data

    natsbox:
        image: natsio/nats-box:latest
        command: ["sleep", "infinity"]
        depends_on:
            - nats

    loki:
        image: grafana/loki:3.0.0
        profiles: ["observability"]
        command: ["-config.file=/etc/loki/config.yaml"]
        ports:
            - "127.0.0.1:3100:3100"
        volumes:
            - ./observability/loki/loki-config.yaml:/etc/loki/config.yaml:ro
            - loki-data:/loki

    tempo:
        image: grafana/tempo:2.7.1
        profiles: ["observability"]
        command: ["-config.file=/etc/tempo/config.yaml"]
        ports:
            - "127.0.0.1:3200:3200"
            - "127.0.0.1:4318:4318"
        volumes:
            - ./observability/tempo/tempo-config.yaml:/etc/tempo/config.yaml:ro
            - tempo-data:/var/tempo

    pyroscope:
        image: grafana/pyroscope:latest
        profiles: ["observability"]
        ports:
            - "127.0.0.1:4040:4040"
        volumes:
            - pyroscope-data:/var/lib/pyroscope

    alloy:
        image: grafana/alloy:latest
        profiles: ["observability"]
        command:
            [
                "run",
                "--server.http.listen-addr=0.0.0.0:12345",
                "/etc/alloy/config.alloy",
            ]
        depends_on:
            - loki
        volumes:
            - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
            - ./tmp/logs:/var/log/artgod:ro

    prometheus:
        image: prom/prometheus:v2.54.1
        profiles: ["observability"]
        network_mode: host
        command:
            [
                "--config.file=/etc/prometheus/prometheus.yml",
                "--web.listen-address=127.0.0.1:9090",
            ]
        volumes:
            - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus-data:/prometheus

    grafana:
        image: grafana/grafana:latest
        profiles: ["observability"]
        network_mode: host
        depends_on:
            - loki
            - prometheus
            - tempo
            - pyroscope
        environment:
            GF_SERVER_HTTP_ADDR: 127.0.0.1
            GF_SERVER_HTTP_PORT: "42701"
            GF_SECURITY_ADMIN_USER: admin
            GF_SECURITY_ADMIN_PASSWORD: admin
            GF_USERS_ALLOW_SIGN_UP: "false"
        volumes:
            - grafana-data:/var/lib/grafana
            - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
    nats-data:
    loki-data:
    tempo-data:
    pyroscope-data:
    prometheus-data:
    grafana-data:
