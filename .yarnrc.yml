# Use "plug'n'play" loader to hook up dependencies
nodeLinker: pnp

# Privacy & performance
enableTelemetry: false
enableGlobalCache: true

# Development experience
preferInteractive: true
progressBarStyle: patrick

# TypeScript ecosystem support
packageExtensions:
  # Ensure Emscripten types are available for pglite
  "@electric-sql/pglite@*":
    peerDependencies:
      "@types/emscripten": "*"

# Build optimization
compressionLevel: mixed

# Git integration
changesetIgnorePatterns:
  - "**/*.tsbuildinfo"

# Use "exact match" to anchor versions for added dependencies
defaultSemverRangePrefix: ""

# Disable post-install scripts and guard from early updates
enableScripts: false
npmMinimalAgeGate: 30d
