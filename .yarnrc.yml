# Use "plug'n'play" loader to hook up dependencies
nodeLinker: pnp

# Privacy & performance
enableTelemetry: false
enableGlobalCache: false

# Development experience
preferInteractive: true
progressBarStyle: patrick

# Build optimization
compressionLevel: mixed

# Git integration
changesetIgnorePatterns:
    - "**/*.tsbuildinfo"

# Use "exact match" to anchor versions for added dependencies
defaultSemverRangePrefix: ""

# Disable post-install scripts and guard from early updates
enableScripts: false
npmMinimalAgeGate: 30d

# Fresh security/release exceptions. Keep this list narrow and version-specific.
npmPreapprovedPackages:
    - "@tauri-apps/api@2.11.1"
    - "@tauri-apps/cli@2.11.3"
    - "@tauri-apps/cli-darwin-arm64@2.11.3"
    - "@tauri-apps/cli-darwin-x64@2.11.3"
    - "@tauri-apps/cli-linux-arm-gnueabihf@2.11.3"
    - "@tauri-apps/cli-linux-arm64-gnu@2.11.3"
    - "@tauri-apps/cli-linux-arm64-musl@2.11.3"
    - "@tauri-apps/cli-linux-riscv64-gnu@2.11.3"
    - "@tauri-apps/cli-linux-x64-gnu@2.11.3"
    - "@tauri-apps/cli-linux-x64-musl@2.11.3"
    - "@tauri-apps/cli-win32-arm64-msvc@2.11.3"
    - "@tauri-apps/cli-win32-ia32-msvc@2.11.3"
    - "@tauri-apps/cli-win32-x64-msvc@2.11.3"
    - "ox@0.14.30"
    - "undici@6.27.0"
    - "undici@7.28.0"
    - "viem@2.54.6"
    - "ws@8.21.0"
