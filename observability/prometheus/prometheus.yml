          runtime: "sync-worker"
      - targets: ["127.0.0.1:9466"]
        labels:
          runtime: "reorg-worker"
      - targets: ["127.0.0.1:9467"]
        labels:
          runtime: "domain-worker"
      - targets: ["127.0.0.1:9468"]
