openapi: 3.0.3
info:
    title: ArtGod Backend API
    version: 0.0.1-pre-alpha.3
    description: |
        OpenAPI schema for the current local backend HTTP API.

        Source of truth for routes is `backend/src/http-routes.ts`.
servers:
    - url: http://127.0.0.1:3000
      description: Local desktop backend

tags:
    - name: Health
    - name: Security
    - name: Chains
    - name: Collections
    - name: Activities
    - name: Bootstrap

paths:
    /health:
        get:
            tags: [Health]
            summary: Liveness check
            operationId: getHealth
            responses:
                "200":
                    description: Backend process is alive
                    content:
                        application/json:
                            schema:
                                type: object
                                required: [status]
                                properties:
                                    status:
                                        type: string
                                        enum: [ok]

    /health/runtime:
        get:
            tags: [Health]
            summary: Runtime dependency health checks
            operationId: getRuntimeHealth
            responses:
                "200":
                    description: Runtime checks completed, no failing checks
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/RuntimeHealthResponse"
                "503":
                    description: Runtime checks completed with one or more failing checks
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/RuntimeHealthResponse"

    /api/security/csrf:
        get:
            tags: [Security]
            summary: Issue CSRF token for mutating API calls
            description: |
                Returns a CSRF token and sets `artgod_csrf` cookie.
                Required before POST/PUT/PATCH/DELETE calls under `/api/*`.
            operationId: issueCsrfToken
            responses:
                "200":
                    description: CSRF token issued
                    headers:
                        Set-Cookie:
                            description: HttpOnly CSRF cookie (`artgod_csrf`)
                            schema:
                                type: string
                    content:
                        application/json:
                            schema:
                                type: object
                                required: [token]
                                properties:
                                    token:
                                        type: string

    /api/chains/default:
        get:
            tags: [Chains]
            summary: Get default chain
            operationId: getDefaultChain
            responses:
                "200":
                    description: Default chain record
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/GetDefaultChainResponse"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"

    /api/{chain_ref}/collections:
        get:
            tags: [Collections]
            summary: List collections for chain
            operationId: listCollections
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - name: status
                  in: query
                  required: false
                  schema:
                      $ref: "#/components/schemas/CollectionStatus"
                - $ref: "#/components/parameters/Limit"
                - $ref: "#/components/parameters/Cursor"
            responses:
                "200":
                    description: Paged collection list
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ListCollectionsResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"

    /api/{chain_ref}/{collection_ref}/activity:
        get:
            tags: [Activities]
            summary: Get collection activity feed
            operationId: getCollectionActivity
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - $ref: "#/components/parameters/CollectionRef"
                - $ref: "#/components/parameters/ActivityKindFilter"
                - $ref: "#/components/parameters/MediaMode"
                - $ref: "#/components/parameters/Limit"
                - $ref: "#/components/parameters/Cursor"
                - name: traits
                  in: query
                  required: false
                  description: Repeated `key:value` trait filter (preferred)
                  schema:
                      type: array
                      items:
                          type: string
                  style: form
                  explode: true
                - name: trait
                  in: query
                  required: false
                  description: Repeated `key:value` trait filter (legacy alias)
                  schema:
                      type: array
                      items:
                          type: string
                  style: form
                  explode: true
                - name: trait_ranges
                  in: query
                  required: false
                  description: Repeated `key:from..to` inclusive unsigned-integer range filter
                  schema:
                      type: array
                      items:
                          type: string
                  style: form
                  explode: true
                - name: trait_range
                  in: query
                  required: false
                  description: Repeated `key:from..to` inclusive unsigned-integer range filter (legacy alias)
                  schema:
                      type: array
                      items:
                          type: string
                  style: form
                  explode: true
            responses:
                "200":
                    description: Collection activity feed ordered newest first with bidirectional cursor pagination; `kind=listings` returns collapsed listing rows
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/GetCollectionActivityResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"

    /api/{chain_ref}/{collection_ref}:
        get:
            tags: [Collections]
            summary: Get collection detail with token page and trait facets
            operationId: getCollectionDetail
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - $ref: "#/components/parameters/CollectionRef"
                - $ref: "#/components/parameters/Limit"
                - $ref: "#/components/parameters/Cursor"
                - $ref: "#/components/parameters/MediaMode"
                - name: token_status
                  in: query
                  required: false
                  description: |
                      Token browser mode.
                      Defaults to `listed`.
                  schema:
                      $ref: "#/components/schemas/TokenBrowserStatus"
                - name: owner
                  in: query
                  required: false
                  description: Optional owner address for holder-scoped token browsing
                  schema:
                      type: string
                - name: traits
                  in: query
                  required: false
                  description: Repeated `key:value` trait filter (preferred)
                  schema:
                      type: array
                      items:
                          type: string
                  style: form
                  explode: true
                - name: trait
                  in: query
                  required: false
                  description: Repeated `key:value` trait filter (legacy alias)
                  schema:
                      type: array
                      items:
                          type: string
                  style: form
                  explode: true
                - name: trait_ranges
                  in: query
                  required: false
                  description: Repeated `key:from..to` inclusive unsigned-integer range filter
                  schema:
                      type: array
                      items:
                          type: string
                  style: form
                  explode: true
                - name: trait_range
                  in: query
                  required: false
                  description: Repeated `key:from..to` inclusive unsigned-integer range filter (legacy alias)
                  schema:
                      type: array
                      items:
                          type: string
                  style: form
                  explode: true
            responses:
                "200":
                    description: Collection detail and paged token results
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/GetCollectionDetailResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"

    /api/{chain_ref}/{collection_ref}/customization:
        get:
            tags: [Collections]
            summary: Get collection customization
            operationId: getCollectionCustomization
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - $ref: "#/components/parameters/CollectionRef"
            responses:
                "200":
                    description: Effective collection customization state
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/GetCollectionCustomizationResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"
        put:
            tags: [Collections]
            summary: Update collection customization
            operationId: updateCollectionCustomization
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - $ref: "#/components/parameters/CollectionRef"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                [
                                    traitFilterPresentation,
                                    tokenCardTraitSummaryTemplate,
                                    activityRowTraitSummaryTemplate,
                                ]
                            additionalProperties: false
                            properties:
                                traitFilterPresentation:
                                    type: object
                                    required: [selectedSource, userConfig]
                                    additionalProperties: false
                                    properties:
                                        selectedSource:
                                            $ref: "#/components/schemas/CollectionCustomizationSource"
                                        userConfig:
                                            $ref: "#/components/schemas/TraitFilterPresentationConfig"
                                tokenCardTraitSummaryTemplate:
                                    type: object
                                    required: [selectedSource, userConfig]
                                    additionalProperties: false
                                    properties:
                                        selectedSource:
                                            $ref: "#/components/schemas/CollectionCustomizationSource"
                                        userConfig:
                                            $ref: "#/components/schemas/TraitSummaryTemplateConfig"
                                activityRowTraitSummaryTemplate:
                                    type: object
                                    required: [selectedSource, userConfig]
                                    additionalProperties: false
                                    properties:
                                        selectedSource:
                                            $ref: "#/components/schemas/CollectionCustomizationSource"
                                        userConfig:
                                            $ref: "#/components/schemas/TraitSummaryTemplateConfig"
            responses:
                "200":
                    description: Updated effective collection customization state
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/GetCollectionCustomizationResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"

    /api/{chain_ref}/{collection_ref}/holders:
        get:
            tags: [Collections]
            summary: Get collection holders
            operationId: getCollectionHolders
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - $ref: "#/components/parameters/CollectionRef"
                - $ref: "#/components/parameters/Limit"
                - $ref: "#/components/parameters/Cursor"
            responses:
                "200":
                    description: Collection holders sorted by token count descending with forward cursor pagination
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/GetCollectionHoldersResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"

    /api/{chain_ref}/{collection_ref}/{token_ref}/activity:
        get:
            tags: [Activities]
            summary: Get token activity feed
            operationId: getTokenActivity
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - $ref: "#/components/parameters/CollectionRef"
                - $ref: "#/components/parameters/TokenRef"
                - $ref: "#/components/parameters/ActivityKindFilter"
                - $ref: "#/components/parameters/MediaMode"
                - $ref: "#/components/parameters/Limit"
                - $ref: "#/components/parameters/Cursor"
            responses:
                "200":
                    description: Token activity feed ordered newest first with bidirectional cursor pagination
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/GetTokenActivityResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"

    /api/{chain_ref}/{collection_ref}/{token_ref}:
        get:
            tags: [Collections]
            summary: Get single token detail
            description: |
                Reserved collection subpaths (for example `bootstrap`) are matched
                by dedicated static routes first.
            operationId: getTokenDetail
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - $ref: "#/components/parameters/CollectionRef"
                - $ref: "#/components/parameters/TokenRef"
                - $ref: "#/components/parameters/MediaMode"
            responses:
                "200":
                    description: Token detail with animation_url and trait rarity stats
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/GetTokenDetailResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"

    /api/{chain_ref}/{collection_ref}/{token_ref}/preview:
        get:
            tags: [Collections]
            summary: Get token preview payload for the modal
            description: |
                Lightweight token media payload used by the token preview modal.
                Returns only media-mode state plus `tokenId`, `image`, and `animationUrl`.
            operationId: getTokenPreview
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - $ref: "#/components/parameters/CollectionRef"
                - $ref: "#/components/parameters/TokenRef"
                - $ref: "#/components/parameters/MediaMode"
            responses:
                "200":
                    description: Token preview payload for the selected media mode
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/GetTokenPreviewResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"

    /api/{chain_ref}/collections/bootstrap:
        post:
            tags: [Bootstrap]
            summary: Create a new bootstrap run
            description: |
                Mutating endpoint protected by host/origin/CSRF checks.
                Requires:
                - loopback Host
                - loopback Origin
                - `x-artgod-csrf` header matching `artgod_csrf` cookie
            operationId: createBootstrapRun
            security:
                - csrfHeader: []
                  csrfCookie: []
            parameters:
                - $ref: "#/components/parameters/ChainRef"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/CreateBootstrapRunRequest"
            responses:
                "200":
                    description: Bootstrap run created and queued
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/CreateBootstrapRunResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "409":
                    $ref: "#/components/responses/Conflict"
                "422":
                    $ref: "#/components/responses/ValidationError"
                "500":
                    $ref: "#/components/responses/InternalError"

    /api/{chain_ref}/{collection_ref}/bootstrap:
        get:
            tags: [Bootstrap]
            summary: Get latest bootstrap status for collection
            operationId: getBootstrapStatus
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - $ref: "#/components/parameters/CollectionRef"
            responses:
                "200":
                    description: Collection bootstrap status and latest run
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/GetBootstrapStatusResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"

    /api/{chain_ref}/bootstrap-runs:
        get:
            tags: [Bootstrap]
            summary: List bootstrap runs for chain
            operationId: listBootstrapRuns
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - name: status
                  in: query
                  required: false
                  schema:
                      $ref: "#/components/schemas/BootstrapRunStatus"
                - $ref: "#/components/parameters/Limit"
                - $ref: "#/components/parameters/Cursor"
            responses:
                "200":
                    description: Paged bootstrap run summaries (newest first)
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ListBootstrapRunsResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"

    /api/{chain_ref}/bootstrap-runs/{run_id}:
        get:
            tags: [Bootstrap]
            summary: Get bootstrap run detail
            operationId: getBootstrapRunDetail
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - $ref: "#/components/parameters/RunId"
            responses:
                "200":
                    description: Bootstrap run detail with derived flow state and failed-task preview
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/GetBootstrapRunDetailResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"

    /api/{chain_ref}/bootstrap-runs/{run_id}/retry-failed:
        post:
            tags: [Bootstrap]
            summary: Retry failed_terminal metadata tasks for a run
            description: |
                Mutating endpoint protected by host/origin/CSRF checks.
                Applies only to the targeted run and only when allowed by run state.
            operationId: retryBootstrapRunFailedTasks
            security:
                - csrfHeader: []
                  csrfCookie: []
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - $ref: "#/components/parameters/RunId"
            requestBody:
                required: false
                content:
                    application/json:
                        schema:
                            type: object
                            additionalProperties: false
            responses:
                "200":
                    description: Retry accepted
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/RetryBootstrapRunFailedTasksResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "409":
                    $ref: "#/components/responses/Conflict"
                "422":
                    $ref: "#/components/responses/ValidationError"
                "500":
                    $ref: "#/components/responses/InternalError"

components:
    securitySchemes:
        csrfHeader:
            type: apiKey
            in: header
            name: x-artgod-csrf
            description: CSRF header token
        csrfCookie:
            type: apiKey
            in: cookie
            name: artgod_csrf
            description: CSRF cookie token

    parameters:
        ChainRef:
            name: chain_ref
            in: path
            required: true
            schema:
                type: string
            description: Chain reference (slug or public chain id string)
        CollectionRef:
            name: collection_ref
            in: path
            required: true
            schema:
                type: string
            description: Collection slug
        TokenRef:
            name: token_ref
            in: path
            required: true
            schema:
                type: string
            description: Token id reference
        RunId:
            name: run_id
            in: path
            required: true
            schema:
                type: integer
                minimum: 1
            description: Bootstrap run id
        Limit:
            name: limit
            in: query
            required: false
            schema:
                type: integer
                minimum: 1
                default: 250
            description: Page size (defaults to 250)
        Cursor:
            name: cursor
            in: query
            required: false
            schema:
                type: string
            description: Opaque page cursor
        ActivityKindFilter:
            name: kind
            in: query
            required: false
            schema:
                $ref: "#/components/schemas/ActivityFeedFilterKind"
            description: |
                Grouped activity-kind filter.
                `sales` returns only `sale`.
                `listings` returns only `listing_created`.
                On the collection activity endpoint, `listings` is collapsed by `tokenId + maker + currency + UTC day` and surfaces the latest raw listing in each group.
                `transfers` returns only `transfer`.
        MediaMode:
            name: media_mode
            in: query
            required: false
            schema:
                type: string
            description: |
                Extension-driven media mode.
                `snapshot` requests canonical token media.
                `artifact` requests extension-provided media when available.
                Unsupported or missing artifact media falls back to canonical token media.

    responses:
        BadRequest:
            description: Invalid request payload or query/path parameter
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"
                    example:
                        error: bad_request
                        message: Invalid limit
        Forbidden:
            description: Security guard rejected request (host/origin/csrf)
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"
                    example:
                        error: forbidden
                        message: Missing CSRF header
        NotFound:
            description: Requested entity or route not found
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"
                    example:
                        error: not_found
                        message: Unknown bootstrap run
        Conflict:
            description: Request conflicts with current bootstrap state
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"
                    example:
                        error: conflict
                        message: Collection already bootstrapping
        ValidationError:
            description: Bootstrap validation failed
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"
                    example:
                        error: validation_error
                        message: Invalid metadata mode
        InternalError:
            description: Internal server error
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"
                    example:
                        error: internal_error
                        message: Internal server error

    schemas:
        ErrorResponse:
            type: object
            required: [error, message]
            additionalProperties: false
            properties:
                error:
                    type: string
                message:
                    type: string

        ChainRecord:
            type: object
            required: [id, type, publicChainId, slug, name]
            additionalProperties: false
            properties:
                id:
                    type: integer
                type:
                    type: string
                publicChainId:
                    type: integer
                slug:
                    type: string
                name:
                    type: string

        CollectionStandard:
            type: string
            enum: [erc721, erc1155]

        CollectionStatus:
            type: string
            enum: [bootstrapping, live, paused, disabled]

        CollectionListItem:
            type: object
            required:
                - chainId
                - collectionId
                - slug
                - address
                - standard
                - status
                - deploymentBlock
                - bootstrapAnchorBlock
                - createdAt
                - updatedAt
            additionalProperties: false
            properties:
                chainId:
                    type: integer
                collectionId:
                    type: integer
                slug:
                    type: string
                address:
                    type: string
                standard:
                    $ref: "#/components/schemas/CollectionStandard"
                status:
                    $ref: "#/components/schemas/CollectionStatus"
                deploymentBlock:
                    type: integer
                    nullable: true
                bootstrapAnchorBlock:
                    type: integer
                    nullable: true
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time

        CursorPageCollection:
            type: object
            required: [items, nextCursor, limit]
            additionalProperties: false
            properties:
                items:
                    type: array
                    items:
                        $ref: "#/components/schemas/CollectionListItem"
                nextCursor:
                    type: string
                    nullable: true
                limit:
                    type: integer

        ListCollectionsResponse:
            type: object
            required: [chain, filters, page]
            additionalProperties: false
            properties:
                chain:
                    $ref: "#/components/schemas/ChainRecord"
                filters:
                    type: object
                    required: [status]
                    additionalProperties: false
                    properties:
                        status:
                            allOf:
                                - $ref: "#/components/schemas/CollectionStatus"
                            nullable: true
                page:
                    $ref: "#/components/schemas/CursorPageCollection"

        TokenAttribute:
            type: object
            required: [key, value]
            additionalProperties: false
            properties:
                key:
                    type: string
                value:
                    type: string

        TokenCard:
            type: object
            required:
                [
                    tokenId,
                    name,
                    image,
                    traitSummary,
                    listingPrice,
                    listingCurrency,
                    attributes,
                    hasMetadata,
                    metadataUpdatedAt,
                ]
            additionalProperties: false
            properties:
                tokenId:
                    type: string
                name:
                    type: string
                    nullable: true
                image:
                    type: string
                    nullable: true
                traitSummary:
                    type: string
                    nullable: true
                listingPrice:
                    type: string
                    nullable: true
                listingCurrency:
                    type: string
                    nullable: true
                attributes:
                    type: array
                    items:
                        $ref: "#/components/schemas/TokenAttribute"
                hasMetadata:
                    type: boolean
                metadataUpdatedAt:
                    type: string
                    format: date-time
                    nullable: true

        TokenDetailTrait:
            type: object
            required: [key, value, tokenCount, rarityPercent]
            additionalProperties: false
            properties:
                key:
                    type: string
                value:
                    type: string
                tokenCount:
                    type: integer
                    nullable: true
                rarityPercent:
                    type: number
                    format: double
                    nullable: true

        TokenDetail:
            type: object
            required:
                [
                    tokenId,
                    name,
                    image,
                    animationUrl,
                    currentHolder,
                    attributes,
                    hasMetadata,
                    metadataUpdatedAt,
                ]
            additionalProperties: false
            properties:
                tokenId:
                    type: string
                name:
                    type: string
                    nullable: true
                image:
                    type: string
                    nullable: true
                animationUrl:
                    type: string
                    nullable: true
                currentHolder:
                    type: string
                    nullable: true
                attributes:
                    type: array
                    items:
                        $ref: "#/components/schemas/TokenDetailTrait"
                hasMetadata:
                    type: boolean
                metadataUpdatedAt:
                    type: string
                    format: date-time
                    nullable: true

        TokenPreview:
            type: object
