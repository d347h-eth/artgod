                    $ref: "#/components/schemas/ChainRecord"
                collection:
                    $ref: "#/components/schemas/CollectionListItem"
                media:
                    $ref: "#/components/schemas/CollectionMediaState"
                traits:
                    type: object
                    required: [selected, selectedRanges, facets]
                    additionalProperties: false
                    properties:
                        selected:
                            type: array
                            items:
                                $ref: "#/components/schemas/TraitFilter"
                        selectedRanges:
                            type: array
                            items:
                                $ref: "#/components/schemas/TraitRangeFilter"
                        facets:
                            type: array
                            items:
                                $ref: "#/components/schemas/TraitFacet"
                activities:
                    $ref: "#/components/schemas/ActivityCursorPage"
                included:
                    $ref: "#/components/schemas/ActivityFeedIncludes"

        GetTokenDetailResponse:
            type: object
            required: [chain, collection, media, token]
            additionalProperties: false
            properties:
                chain:
                    $ref: "#/components/schemas/ChainRecord"
                collection:
                    $ref: "#/components/schemas/CollectionListItem"
                media:
                    $ref: "#/components/schemas/CollectionMediaState"
                token:
                    $ref: "#/components/schemas/TokenDetail"

        GetTokenPreviewResponse:
            type: object
            required: [media, token]
            additionalProperties: false
            properties:
                media:
                    $ref: "#/components/schemas/CollectionMediaState"
                token:
                    $ref: "#/components/schemas/TokenPreview"

        GetTokenActivityResponse:
            type: object
            required: [chain, collection, media, token, activities, included]
            additionalProperties: false
            properties:
                chain:
                    $ref: "#/components/schemas/ChainRecord"
                collection:
                    $ref: "#/components/schemas/CollectionListItem"
                media:
                    $ref: "#/components/schemas/CollectionMediaState"
                token:
                    $ref: "#/components/schemas/TokenDetail"
                activities:
                    $ref: "#/components/schemas/ActivityCursorPage"
                included:
                    $ref: "#/components/schemas/ActivityFeedIncludes"

        GetDefaultChainResponse:
            type: object
            required: [chain]
            additionalProperties: false
            properties:
                chain:
                    $ref: "#/components/schemas/ChainRecord"

        ResolveOwnerRefResponse:
            type: object
            required: [input, resolvedAddress]
            additionalProperties: false
            properties:
                input:
                    type: string
                resolvedAddress:
                    type: string

        BootstrapMetadataMode:
            type: string
            enum: [strict, best_effort]

        BootstrapEnumerationMode:
            type: string
            enum: [enumerable, manual_token_ids, manual_range]

        BootstrapRunStatus:
            type: string
            enum:
                [
                    requested,
                    queued,
                    metadata,
                    image_cache,
                    ownership,
                    backfill,
                    completed,
                    failed,
                ]

        BootstrapRunRow:
            type: object
            required:
                - runId
                - chainId
                - collectionId
                - requestSlug
                - requestOpenseaSlug
                - requestAddress
                - requestStandard
                - requestExtensionKey
                - metadataMode
                - enumerationMode
                - manualTokenIdsJson
                - manualRangeStartTokenId
                - manualRangeTotalSupply
                - imageCacheMode
                - imageCacheMaxDimension
                - deploymentBlock
                - status
                - anchorBlock
                - anchorBlockHash
                - anchorBlockTimestamp
                - errorCode
                - errorMessage
                - createdAt
                - updatedAt
                - finishedAt
            additionalProperties: false
            properties:
                runId:
                    type: integer
                chainId:
                    type: integer
                collectionId:
                    type: integer
                requestSlug:
                    type: string
                requestOpenseaSlug:
                    type: string
                    nullable: true
                requestAddress:
                    type: string
                requestStandard:
                    $ref: "#/components/schemas/CollectionStandard"
                requestExtensionKey:
                    type: string
                    nullable: true
                metadataMode:
                    $ref: "#/components/schemas/BootstrapMetadataMode"
                enumerationMode:
                    $ref: "#/components/schemas/BootstrapEnumerationMode"
                manualTokenIdsJson:
                    type: string
                    nullable: true
                manualRangeStartTokenId:
                    type: string
                    nullable: true
                manualRangeTotalSupply:
                    type: integer
                    nullable: true
                imageCacheMode:
                    $ref: "#/components/schemas/ImageCacheMode"
                imageCacheMaxDimension:
                    type: integer
                    nullable: true
                deploymentBlock:
                    type: integer
                    nullable: true
                status:
                    $ref: "#/components/schemas/BootstrapRunStatus"
                anchorBlock:
                    type: integer
                    nullable: true
                anchorBlockHash:
                    type: string
                    nullable: true
                anchorBlockTimestamp:
                    type: integer
                    nullable: true
                errorCode:
                    type: string
                    nullable: true
                errorMessage:
                    type: string
                    nullable: true
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
                finishedAt:
                    type: string
                    format: date-time
                    nullable: true

        BootstrapRunTaskCounts:
            type: object
            required: [pending, retry, succeeded, failedTerminal, total]
            additionalProperties: false
            properties:
                pending:
                    type: integer
                retry:
                    type: integer
                succeeded:
                    type: integer
                failedTerminal:
                    type: integer
                total:
                    type: integer

        BootstrapFlowStepState:
            type: string
            enum: [pending, active, completed, failed]

        BootstrapFlowStepKey:
            type: string
            enum:
                [
                    requested,
                    queued,
                    anchor,
                    enumeration,
                    metadata,
                    image_cache,
                    ownership,
                    backfill,
                    collection_live,
                    opensea_identity,
                    opensea_snapshot,
                    opensea_ready,
                ]

        BootstrapFlowStep:
            type: object
            required: [key, label, state, detailText, progress]
            additionalProperties: false
            properties:
                key:
                    $ref: "#/components/schemas/BootstrapFlowStepKey"
                label:
                    type: string
                state:
                    $ref: "#/components/schemas/BootstrapFlowStepState"
                detailText:
                    type: string
                    nullable: true
                progress:
                    type: object
                    nullable: true
                    required: [completed, total]
                    additionalProperties: false
                    properties:
                        completed:
                            type: integer
                        total:
                            type: integer

        BootstrapRunFlow:
            type: object
            required: [steps, isTerminal, shouldPoll]
            additionalProperties: false
            properties:
                steps:
                    type: array
                    items:
                        $ref: "#/components/schemas/BootstrapFlowStep"
                isTerminal:
                    type: boolean
                shouldPoll:
                    type: boolean

        BootstrapRunCollectionSummary:
            type: object
            required: [chainId, collectionId, slug, address, status]
            additionalProperties: false
            properties:
                chainId:
                    type: integer
                collectionId:
                    type: integer
                slug:
                    type: string
                address:
                    type: string
                status:
                    $ref: "#/components/schemas/CollectionStatus"

        BootstrapRunListItem:
            type: object
            required: [run, collection, metadataTasks]
            additionalProperties: false
            properties:
                run:
                    $ref: "#/components/schemas/BootstrapRunRow"
                collection:
                    $ref: "#/components/schemas/BootstrapRunCollectionSummary"
                metadataTasks:
                    $ref: "#/components/schemas/BootstrapRunTaskCounts"

        ListBootstrapRunsResponse:
            type: object
            required: [chain, filters, page]
            additionalProperties: false
            properties:
                chain:
                    $ref: "#/components/schemas/ChainRecord"
                filters:
                    type: object
                    required: [status]
                    additionalProperties: false
                    properties:
                        status:
                            allOf:
                                - $ref: "#/components/schemas/BootstrapRunStatus"
                            nullable: true
                page:
                    type: object
                    required: [items, nextCursor, limit]
                    additionalProperties: false
                    properties:
                        items:
                            type: array
                            items:
                                $ref: "#/components/schemas/BootstrapRunListItem"
                        nextCursor:
                            type: string
                            nullable: true
                        limit:
                            type: integer

        BootstrapMetadataTaskStatus:
            type: string
            enum: [pending, retry, succeeded, failed_terminal]

        BootstrapMetadataTaskListItem:
            type: object
            required:
                [
                    tokenId,
                    status,
                    attempts,
                    nextAttemptAt,
                    lastError,
                    lastErrorAt,
                ]
            additionalProperties: false
            properties:
                tokenId:
                    type: string
                status:
                    $ref: "#/components/schemas/BootstrapMetadataTaskStatus"
                attempts:
                    type: integer
                nextAttemptAt:
                    type: integer
                lastError:
                    type: string
                    nullable: true
                lastErrorAt:
                    type: integer
                    nullable: true

        GetBootstrapRunDetailResponse:
            type: object
            required:
                - run
                - collection
                - metadataTasks
                - flow
                - failedMetadataTasksPreview
                - failedMetadataTasksPreviewLimit
                - isLatestForCollection
            additionalProperties: false
            properties:
                run:
                    $ref: "#/components/schemas/BootstrapRunRow"
                collection:
                    $ref: "#/components/schemas/BootstrapRunCollectionSummary"
                metadataTasks:
                    $ref: "#/components/schemas/BootstrapRunTaskCounts"
                flow:
                    $ref: "#/components/schemas/BootstrapRunFlow"
                failedMetadataTasksPreview:
                    type: array
                    items:
                        $ref: "#/components/schemas/BootstrapMetadataTaskListItem"
                failedMetadataTasksPreviewLimit:
                    type: integer
                    example: 50
                isLatestForCollection:
                    type: boolean

        BootstrapStatusCollection:
            type: object
            required:
                - chainId
                - collectionId
                - slug
                - address
                - standard
                - status
                - deploymentBlock
                - bootstrapAnchorBlock
                - bootstrapStartedAt
                - bootstrapFinishedAt
                - bootstrapLastSyncedBlock
            additionalProperties: false
            properties:
                chainId:
                    type: integer
                collectionId:
                    type: integer
                slug:
                    type: string
                address:
                    type: string
                standard:
                    $ref: "#/components/schemas/CollectionStandard"
                status:
                    $ref: "#/components/schemas/CollectionStatus"
                deploymentBlock:
                    type: integer
                    nullable: true
                bootstrapAnchorBlock:
                    type: integer
                    nullable: true
                bootstrapStartedAt:
                    type: string
                    format: date-time
                    nullable: true
                bootstrapFinishedAt:
                    type: string
                    format: date-time
                    nullable: true
                bootstrapLastSyncedBlock:
                    type: integer
                    nullable: true

        GetBootstrapStatusResponse:
            type: object
            required: [collection, latestRun, metadataTasks]
            additionalProperties: false
            properties:
                collection:
                    $ref: "#/components/schemas/BootstrapStatusCollection"
                latestRun:
                    allOf:
                        - $ref: "#/components/schemas/BootstrapRunRow"
                    nullable: true
                metadataTasks:
                    $ref: "#/components/schemas/BootstrapRunTaskCounts"

        CreateBootstrapRunRequest:
            type: object
            required:
                [slug, address, standard, metadataMode, supportsEnumerable]
            additionalProperties: false
            properties:
                slug:
                    type: string
                address:
                    type: string
                    description: Lower/upper case accepted, normalized to lowercase by backend
                openseaSlug:
                    type: string
                    nullable: true
                standard:
                    type: string
                    enum: [erc721]
                metadataMode:
                    $ref: "#/components/schemas/BootstrapMetadataMode"
                supportsEnumerable:
                    type: boolean
                manualInput:
                    oneOf:
                        - type: object
                          required: [mode, tokenIds]
                          additionalProperties: false
                          properties:
                              mode:
                                  type: string
                                  enum: [manual_token_ids]
                              tokenIds:
                                  type: array
                                  items:
                                      type: string
                        - type: object
                          required: [mode, startTokenId, totalSupply]
                          additionalProperties: false
                          properties:
                              mode:
                                  type: string
                                  enum: [manual_range]
                              startTokenId:
                                  type: string
                              totalSupply:
                                  type: integer
                                  minimum: 1
                imageCache:
                    type: object
                    required: [imageCacheMode, maxDimension]
                    additionalProperties: false
                    properties:
                        imageCacheMode:
                            $ref: "#/components/schemas/ImageCacheMode"
                        maxDimension:
                            type: integer
                            nullable: true
                            minimum: 64
                            maximum: 4096
                deploymentBlock:
                    type: integer
                    minimum: 1

        CreateBootstrapRunResponse:
            type: object
            required: [runId, collectionId, status, createdAt]
            additionalProperties: false
            properties:
                runId:
                    type: integer
                collectionId:
                    type: integer
                status:
                    type: string
                createdAt:
                    type: string
                    format: date-time

        RetryBootstrapRunFailedTasksResponse:
            type: object
            required: [runId, updatedCount, status]
            additionalProperties: false
            properties:
                runId:
                    type: integer
                updatedCount:
                    type: integer
                status:
                    type: string

        RuntimeHealthCheck:
            type: object
            required: [key, status, message]
            additionalProperties: false
            properties:
                key:
                    type: string
                status:
                    type: string
                    enum: [pass, warn, fail]
                message:
                    type: string

        RuntimeHealthResponse:
            type: object
            required: [ok, checks]
            additionalProperties: false
            properties:
                ok:
                    type: boolean
                checks:
                    type: array
                    items:
                        $ref: "#/components/schemas/RuntimeHealthCheck"
