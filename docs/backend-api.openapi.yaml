openapi: 3.0.3
info:
    title: ArtGod Backend API
    version: 0.0.1-pre-alpha.47
    description: |
        OpenAPI schema for the current local backend HTTP API.

        Source of truth for routes is `backend/src/http-routes.ts`.
servers:
    - url: http://127.0.0.1:42710
      description: Local desktop backend

tags:
    - name: Health
    - name: Security
    - name: Chains
    - name: Collections
    - name: Activities
    - name: Bootstrap
    - name: Sync
    - name: Trading

paths:
    /health:
        get:
            tags: [Health]
            summary: Liveness check
            operationId: getHealth
            responses:
                "200":
                    description: Backend process is alive
                    content:
                        application/json:
                            schema:
                                type: object
                                required: [status]
                                properties:
                                    status:
                                        type: string
                                        enum: [ok]

    /health/runtime:
        get:
            tags: [Health]
            summary: Runtime dependency health checks
            operationId: getRuntimeHealth
            responses:
                "200":
                    description: Runtime checks completed, no failing checks
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/RuntimeHealthResponse"
                "503":
                    description: Runtime checks completed with one or more failing checks
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/RuntimeHealthResponse"

    /api/security/csrf:
        get:
            tags: [Security]
            summary: Issue CSRF token for mutating API calls
            description: |
                Returns a CSRF token and sets `artgod_csrf` cookie.
                Required before POST/PUT/PATCH/DELETE calls under `/api/*`.
            operationId: issueCsrfToken
            responses:
                "200":
                    description: CSRF token issued
                    headers:
                        Set-Cookie:
                            description: HttpOnly CSRF cookie (`artgod_csrf`)
                            schema:
                                type: string
                    content:
                        application/json:
                            schema:
                                type: object
                                required: [token]
                                properties:
                                    token:
                                        type: string

    /api/chains/default:
        get:
            tags: [Chains]
            summary: Get default chain
            operationId: getDefaultChain
            responses:
                "200":
                    description: Default chain record
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/GetDefaultChainResponse"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"

    /api/{chain_ref}/resolve-owner-ref:
        get:
            tags: [Owners]
            summary: Resolve owner ref to canonical address
            operationId: resolveOwnerRef
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - name: value
                  in: query
                  required: true
                  schema:
                      type: string
                  description: Raw owner ref or `.eth` ENS name
            responses:
                "200":
                    description: Resolved canonical owner address
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ResolveOwnerRefResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"

    /api/{chain_ref}/collections:
        get:
            tags: [Collections]
            summary: List collections for chain
            operationId: listCollections
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - name: status
                  in: query
                  required: false
                  schema:
                      $ref: "#/components/schemas/CollectionStatus"
                - $ref: "#/components/parameters/Limit"
                - $ref: "#/components/parameters/Cursor"
            responses:
                "200":
                    description: Paged collection list
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ListCollectionsResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"

    /api/{chain_ref}/blockspace:
        get:
            tags: [Sync]
            summary: Get chain blockspace coverage grid
            operationId: getBlockspaceState
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - name: collection
                  in: query
                  required: false
                  description: "`any` for global block coverage, or a live collection slug for collection-specific coverage"
                  schema:
                      type: string
                      default: any
                - name: page_start
                  in: query
                  required: false
                  description: Aligned first block for a drilled blockspace page. Omit with `bucket_size` for the organic root page.
                  schema:
                      type: integer
                      minimum: 0
                - name: bucket_size
                  in: query
                  required: false
                  description: Real blocks represented by each visual cell. Must be a power-of-1024 divisor from the current root page.
                  schema:
                      type: integer
                      minimum: 1
            responses:
                "200":
                    description: Blockspace coverage state
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/BlockspaceStateResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"

    /api/{chain_ref}/blockspace/range:
        get:
            tags: [Sync]
            summary: Get blockspace summary for a block range
            operationId: getBlockspaceRangeSummary
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - name: collection
                  in: query
                  required: false
                  description: "`any` for global block coverage, or a live collection slug for collection-specific coverage"
                  schema:
                      type: string
                      default: any
                - name: from_block
                  in: query
                  required: true
                  schema:
                      type: integer
                      minimum: 0
                - name: to_block
                  in: query
                  required: true
                  schema:
                      type: integer
                      minimum: 0
            responses:
                "200":
                    description: Blockspace range summary
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/BlockspaceRangeSummaryResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"

    /api/{chain_ref}/blockspace/backfill:
        post:
            tags: [Sync]
            summary: Queue manual backfill for a block range
            operationId: scheduleBlockspaceBackfill
            parameters:
                - $ref: "#/components/parameters/ChainRef"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/ScheduleBlockspaceBackfillRequest"
            responses:
                "200":
                    description: Manual backfill jobs queued
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ScheduleBlockspaceBackfillResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "404":
                    $ref: "#/components/responses/NotFound"
                "409":
                    $ref: "#/components/responses/Conflict"
                "500":
                    $ref: "#/components/responses/InternalError"

    /api/{chain_ref}/{collection_ref}/activity:
        get:
            tags: [Activities]
            summary: Get collection activity feed
            operationId: getCollectionActivity
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - $ref: "#/components/parameters/CollectionRef"
                - $ref: "#/components/parameters/MediaMode"
                - $ref: "#/components/parameters/ActivityKindFilter"
                - $ref: "#/components/parameters/ExtensionEventFilter"
                - $ref: "#/components/parameters/ActivityTokenIdFilter"
                - $ref: "#/components/parameters/ActivityMakerFilter"
                - $ref: "#/components/parameters/ActivityContentHashFilter"
                - $ref: "#/components/parameters/MediaMode"
                - $ref: "#/components/parameters/Limit"
                - $ref: "#/components/parameters/Cursor"
                - name: traits
                  in: query
                  required: false
                  description: Repeated `key:value` trait filter (preferred)
                  schema:
                      type: array
                      items:
                          type: string
                  style: form
                  explode: true
                - name: trait
                  in: query
                  required: false
                  description: Repeated `key:value` trait filter (legacy alias)
                  schema:
                      type: array
                      items:
                          type: string
                  style: form
                  explode: true
                - name: trait_ranges
                  in: query
                  required: false
                  description: Repeated `key:from..to` inclusive unsigned-integer range filter
                  schema:
                      type: array
                      items:
                          type: string
                  style: form
                  explode: true
                - name: trait_range
                  in: query
                  required: false
                  description: Repeated `key:from..to` inclusive unsigned-integer range filter (legacy alias)
                  schema:
                      type: array
                      items:
                          type: string
                  style: form
                  explode: true
            responses:
                "200":
                    description: Collection activity feed ordered newest first with bidirectional cursor pagination; `kind=listings` returns collapsed listing rows
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/GetCollectionActivityResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"

    /api/{chain_ref}/{collection_ref}:
        get:
            tags: [Collections]
            summary: Get collection detail with token page and trait facets
            operationId: getCollectionDetail
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - $ref: "#/components/parameters/CollectionRef"
                - $ref: "#/components/parameters/Limit"
                - $ref: "#/components/parameters/Cursor"
                - $ref: "#/components/parameters/MediaMode"
                - name: token_status
                  in: query
                  required: false
                  description: |
                      Token browser mode.
                      Defaults to `listed`.
                  schema:
                      $ref: "#/components/schemas/TokenBrowserStatus"
                - name: owner
                  in: query
                  required: false
                  description: Optional owner address for holder-scoped token browsing
                  schema:
                      type: string
                - name: traits
                  in: query
                  required: false
                  description: Repeated `key:value` trait filter (preferred)
                  schema:
                      type: array
                      items:
                          type: string
                  style: form
                  explode: true
                - name: trait
                  in: query
                  required: false
                  description: Repeated `key:value` trait filter (legacy alias)
                  schema:
                      type: array
                      items:
                          type: string
                  style: form
                  explode: true
                - name: trait_ranges
                  in: query
                  required: false
                  description: Repeated `key:from..to` inclusive unsigned-integer range filter
                  schema:
                      type: array
                      items:
                          type: string
                  style: form
                  explode: true
                - name: trait_range
                  in: query
                  required: false
                  description: Repeated `key:from..to` inclusive unsigned-integer range filter (legacy alias)
                  schema:
                      type: array
                      items:
                          type: string
                  style: form
                  explode: true
            responses:
                "200":
                    description: Collection detail and paged token results
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/GetCollectionDetailResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"
        delete:
            tags: [Collections]
            summary: Purge all local data for one collection
            description: |
                Destructive admin endpoint protected by host/origin/CSRF checks.
                The request body must include confirmation word `purge`.
            operationId: purgeCollection
            security:
                - csrfHeader: []
                  csrfCookie: []
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - $ref: "#/components/parameters/CollectionRef"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/PurgeCollectionRequest"
            responses:
                "200":
                    description: Collection data purged from local database
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/PurgeCollectionResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "422":
                    $ref: "#/components/responses/ValidationError"
                "500":
                    $ref: "#/components/responses/InternalError"

    /api/{chain_ref}/{collection_ref}/traits/catalog:
        get:
            tags: [Collections]
            summary: Get exact minted counts for requested collection trait keys
            operationId: getCollectionTraitCatalog
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - $ref: "#/components/parameters/CollectionRef"
                - name: keys
                  in: query
                  required: false
                  description: Comma-delimited or repeated trait keys to count
                  schema:
                      type: array
                      items:
                          type: string
                  style: form
                  explode: true
                - name: key
                  in: query
                  required: false
                  description: Comma-delimited or repeated trait keys to count
                  schema:
                      type: array
                      items:
                          type: string
                  style: form
                  explode: true
                - name: scope_traits
                  in: query
                  required: false
                  description: Optional repeated `key:value` trait scope used before counting requested keys
                  schema:
                      type: array
                      items:
                          type: string
                  style: form
                  explode: true
                - name: scope_trait
                  in: query
                  required: false
                  description: Optional repeated `key:value` trait scope used before counting requested keys
                  schema:
                      type: array
                      items:
                          type: string
                  style: form
                  explode: true
            responses:
                "200":
                    description: Trait-value counts for requested keys within the optional scope
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/GetCollectionTraitCatalogResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"

    /api/{chain_ref}/{collection_ref}/customization:
        get:
            tags: [Collections]
            summary: Get collection customization
            operationId: getCollectionCustomization
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - $ref: "#/components/parameters/CollectionRef"
            responses:
                "200":
                    description: Effective collection customization state
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/GetCollectionCustomizationResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"
        put:
            tags: [Collections]
            summary: Update collection customization
            operationId: updateCollectionCustomization
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - $ref: "#/components/parameters/CollectionRef"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required:
                                [
                                    traitFilterPresentation,
                                    tokenCardTraitSummaryTemplate,
                                    activityRowTraitSummaryTemplate,
                                    imageCachePolicy,
                                ]
                            additionalProperties: false
                            properties:
                                traitFilterPresentation:
                                    type: object
                                    required: [selectedSource, userConfig]
                                    additionalProperties: false
                                    properties:
                                        selectedSource:
                                            $ref: "#/components/schemas/CollectionCustomizationSource"
                                        userConfig:
                                            $ref: "#/components/schemas/TraitFilterPresentationConfig"
                                tokenCardTraitSummaryTemplate:
                                    type: object
                                    required: [selectedSource, userConfig]
                                    additionalProperties: false
                                    properties:
                                        selectedSource:
                                            $ref: "#/components/schemas/CollectionCustomizationSource"
                                        userConfig:
                                            $ref: "#/components/schemas/TraitSummaryTemplateConfig"
                                activityRowTraitSummaryTemplate:
                                    type: object
                                    required: [selectedSource, userConfig]
                                    additionalProperties: false
                                    properties:
                                        selectedSource:
                                            $ref: "#/components/schemas/CollectionCustomizationSource"
                                        userConfig:
                                            $ref: "#/components/schemas/TraitSummaryTemplateConfig"
                                imageCachePolicy:
                                    type: object
                                    required: [selectedSource, userConfig]
                                    additionalProperties: false
                                    properties:
                                        selectedSource:
                                            $ref: "#/components/schemas/CollectionCustomizationSource"
                                        userConfig:
                                            $ref: "#/components/schemas/ImageCachePolicyConfig"
            responses:
                "200":
                    description: Updated effective collection customization state
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/GetCollectionCustomizationResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"

    /api/{chain_ref}/{collection_ref}/bidding/bids:
        get:
            tags: [Trading]
            summary: Get collection bid book
            description: |
                Returns display-only bid-book rows.
                `bid_scope=token` also returns `tokenOfferCards`, a paginated token-card page with all non-muted explicit token-scoped offers for each returned token.
                Token-scoped offers and trait-scoped bid rows below 10% of the top collection-wide bid are hidden; token-card offer counts also exclude hidden token offers.
                Source is `bot_snapshot` when enabled collection jobs exist, the bidding bot heartbeat is live, and projection metadata is fresh; otherwise source is `orders`.
            operationId: listCollectionBiddingBidBook
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - $ref: "#/components/parameters/CollectionRef"
                - $ref: "#/components/parameters/BidScopeFilter"
                - $ref: "#/components/parameters/BiddingTraitJoinMode"
                - $ref: "#/components/parameters/Limit"
                - $ref: "#/components/parameters/Cursor"
                - name: maker
                  in: query
                  required: false
                  description: Optional maker address filter. ENS names should be resolved through `/api/{chain_ref}/resolve-owner-ref` before calling this endpoint.
                  schema:
                      type: string
                - name: traits
                  in: query
                  required: false
                  description: Repeated `key:value` trait filter
                  schema:
                      type: array
                      items:
                          type: string
                  style: form
                  explode: true
                - name: trait_ranges
                  in: query
                  required: false
                  description: Repeated `key:from..to` inclusive unsigned-integer range filter
                  schema:
                      type: array
                      items:
                          type: string
                  style: form
                  explode: true
            responses:
                "200":
                    description: Collection bid book
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ListCollectionBiddingBidBookResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"

    /api/{chain_ref}/{collection_ref}/bidding/price-tiers:
        get:
            tags: [Trading]
            summary: List collection bidding price tiers
            description: Returns collection-scoped tier definitions plus bidding UI defaults used by job drafting.
            operationId: listCollectionBiddingPriceTiers
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - $ref: "#/components/parameters/CollectionRef"
            responses:
                "200":
                    description: Collection bidding price tiers and settings
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ListCollectionBiddingPriceTiersResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"
        put:
            tags: [Trading]
            summary: Create or update a collection bidding price tier
            description: Mutating endpoint protected by host/origin/CSRF checks.
            operationId: upsertCollectionBiddingPriceTier
            security:
                - csrfHeader: []
                  csrfCookie: []
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - $ref: "#/components/parameters/CollectionRef"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/UpsertCollectionBiddingPriceTierRequest"
            responses:
                "200":
                    description: Price tier created or updated, with the resolved active tier list
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/CollectionBiddingPriceTierMutationResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "422":
                    $ref: "#/components/responses/ValidationError"
                "500":
                    $ref: "#/components/responses/InternalError"

    /api/{chain_ref}/{collection_ref}/bidding/price-tiers/{tier_id}:
        delete:
            tags: [Trading]
            summary: Archive a collection bidding price tier
            description: Mutating endpoint protected by host/origin/CSRF checks.
            operationId: archiveCollectionBiddingPriceTier
            security:
                - csrfHeader: []
                  csrfCookie: []
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - $ref: "#/components/parameters/CollectionRef"
                - $ref: "#/components/parameters/TierId"
            responses:
                "200":
                    description: Price tier archived, with the remaining resolved active tier list
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/CollectionBiddingPriceTierMutationResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "422":
                    $ref: "#/components/responses/ValidationError"
                "500":
                    $ref: "#/components/responses/InternalError"

    /api/{chain_ref}/{collection_ref}/bidding/price-tiers/{tier_id}/reapply-preview:
        get:
            tags: [Trading]
            summary: Preview a price tier reapply
            description: Builds a staged diff for all current jobs backed by the selected tier without mutating jobs.
            operationId: previewBiddingPriceTierReapply
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - $ref: "#/components/parameters/CollectionRef"
                - $ref: "#/components/parameters/TierId"
            responses:
                "200":
                    description: Price tier reapply preview
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/BiddingPriceTierReapplyPreviewResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/InternalError"

    /api/{chain_ref}/{collection_ref}/bidding/price-tiers/{tier_id}/reapply:
        post:
            tags: [Trading]
            summary: Apply selected price tier changes to jobs
            description: Mutating endpoint protected by host/origin/CSRF checks. Applies only the selected changed jobs and publishes runtime wake-ups.
            operationId: applyBiddingPriceTierReapply
            security:
                - csrfHeader: []
                  csrfCookie: []
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - $ref: "#/components/parameters/CollectionRef"
                - $ref: "#/components/parameters/TierId"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/ApplyBiddingPriceTierReapplyRequest"
            responses:
                "200":
                    description: Selected tier-backed jobs updated
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/BiddingPriceTierReapplyApplyResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "422":
                    $ref: "#/components/responses/ValidationError"
                "500":
                    $ref: "#/components/responses/InternalError"

    /api/{chain_ref}/{collection_ref}/bidding/settings:
        put:
            tags: [Trading]
            summary: Update collection bidding settings
            description: Mutating endpoint protected by host/origin/CSRF checks. Settings are stored in generic collection-scoped settings and interpreted by the bidding domain.
            operationId: updateCollectionBiddingSettings
            security:
                - csrfHeader: []
                  csrfCookie: []
            parameters:
                - $ref: "#/components/parameters/ChainRef"
                - $ref: "#/components/parameters/CollectionRef"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/UpdateCollectionBiddingSettingsRequest"
            responses:
                "200":
                    description: Updated collection bidding settings
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/CollectionBiddingSettingsMutationResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "422":
                    $ref: "#/components/responses/ValidationError"
                "500":
                    $ref: "#/components/responses/InternalError"

    /api/{chain_ref}/{collection_ref}/bidding/jobs/target-lookup:
        post:
            tags: [Trading]
            summary: Look up an existing bidding job by draft target
            description: Protected admin endpoint. POST is used because target descriptors are structured; the call is read-only but still requires CSRF because all `/api/*` POST requests are guarded.
            operationId: lookupBiddingJobTarget
            security:
                - csrfHeader: []
