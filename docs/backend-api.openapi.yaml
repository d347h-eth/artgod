                                $ref: "#/components/schemas/RetryBootstrapRunFailedTasksResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "409":
                    $ref: "#/components/responses/Conflict"
                "422":
                    $ref: "#/components/responses/ValidationError"
                "500":
                    $ref: "#/components/responses/InternalError"

components:
    securitySchemes:
        csrfHeader:
            type: apiKey
            in: header
            name: x-artgod-csrf
            description: CSRF header token
        csrfCookie:
            type: apiKey
            in: cookie
            name: artgod_csrf
            description: CSRF cookie token

    parameters:
        ChainRef:
            name: chain_ref
            in: path
            required: true
            schema:
                type: string
            description: Chain reference (slug or public chain id string)
        CollectionRef:
            name: collection_ref
            in: path
            required: true
            schema:
                type: string
            description: Collection slug
        TokenRef:
            name: token_ref
            in: path
            required: true
            schema:
                type: string
            description: Token id reference
        JobId:
            name: job_id
            in: path
            required: true
            schema:
                type: string
            description: Declared trading job id
        TierId:
            name: tier_id
            in: path
            required: true
            schema:
                type: string
            description: Collection bidding price tier id
        RunId:
            name: run_id
            in: path
            required: true
            schema:
                type: integer
                minimum: 1
            description: Bootstrap run id
        Limit:
            name: limit
            in: query
            required: false
            schema:
                type: integer
                minimum: 1
                default: 250
            description: Page size (defaults to 250)
        Cursor:
            name: cursor
            in: query
            required: false
            schema:
                type: string
            description: Opaque page cursor
        ActivityKindFilter:
            name: kind
            in: query
            required: false
            schema:
                $ref: "#/components/schemas/ActivityFeedFilterKind"
            description: |
                Grouped activity-kind filter.
                `sales` returns only `sale`.
                `listings` returns only `listing_created`.
                On the collection activity endpoint, `listings` is collapsed by `tokenId + maker + currency + UTC day` and surfaces the latest raw listing in each group.
                `transfers` returns only `transfer`.
        ExtensionEventFilter:
            name: extension_event
            in: query
            required: false
            schema:
                type: string
                pattern: "^[a-z0-9_-]+:[a-z0-9_.-]+$"
            description: Extension-provided event feed reference as `extension_key:event_key`. When present, this selects `custom` activity rows produced by that extension event.
        ActivityTokenIdFilter:
            name: token_id
            in: query
            required: false
            schema:
                type: string
                pattern: "^\\d+$"
            description: Optional token id filter for collection activity feeds.
        ActivityMakerFilter:
            name: maker
            in: query
            required: false
            schema:
                type: string
            description: Optional maker/actor address or ENS reference for collection activity feeds.
        ActivityContentHashFilter:
            name: content_hash
            in: query
            required: false
            schema:
                type: string
                pattern: "^0x[0-9a-fA-F]{64}$"
            description: Optional extension event content hash filter.
        MediaMode:
            name: media_mode
            in: query
            required: false
            schema:
                type: string
            description: |
                Extension-driven media mode.
                `snapshot` requests canonical token media.
                `artifact` requests extension-provided media when available.
                Unsupported or missing artifact media falls back to canonical token media.
        BidScopeFilter:
            name: bid_scope
            in: query
            required: false
            schema:
                type: string
                enum: [token, traits, collection]
                default: token
            description: Collection bid-book scope view. `token` shows explicit token-scoped offers as token cards; `traits` shows trait-scoped bids; `collection` shows collection-wide bids only.
        BiddingTraitJoinMode:
            name: trait_join
            in: query
            required: false
            schema:
                type: string
                enum: [or, and]
                default: or
            description: Bidding trait bid-book matching mode. `or` shows trait bids matching any selected key-value or range; `and` shows trait bids whose full criteria set exactly matches the selected key-values and ranges.

    responses:
        BadRequest:
            description: Invalid request payload or query/path parameter
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"
                    example:
                        error: bad_request
                        message: Invalid limit
        Forbidden:
            description: Security guard rejected request (host/origin/csrf)
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"
                    example:
                        error: forbidden
                        message: Missing CSRF header
        NotFound:
            description: Requested entity or route not found
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"
                    example:
                        error: not_found
                        message: Unknown bootstrap run
        Conflict:
            description: Request conflicts with current bootstrap state
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"
                    example:
                        error: conflict
                        message: Collection already bootstrapping
        ValidationError:
            description: Request validation failed after transport parsing
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"
                    example:
                        error: validation_error
                        message: floorEth must be <= ceilingEth
        InternalError:
            description: Internal server error
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"
                    example:
                        error: internal_error
                        message: Internal server error

    schemas:
        ErrorResponse:
            type: object
            required: [error, message]
            additionalProperties: false
            properties:
                error:
                    type: string
                message:
                    type: string

        ChainRecord:
            type: object
            required:
                - id
                - type
                - publicChainId
                - slug
                - name
                - averageBlockTimeSeconds
                - genesisBlockNumber
                - genesisBlockTimestamp
            additionalProperties: false
            properties:
                id:
                    type: integer
                type:
                    type: string
                publicChainId:
                    type: integer
                slug:
                    type: string
                name:
                    type: string
                averageBlockTimeSeconds:
                    type: number
                    description: Chain-level average block duration used for single-block display estimates.
                genesisBlockNumber:
                    type: integer
                    nullable: true
                    description: Optional chain-specific genesis block number; backend defaults to 0 when absent.
                genesisBlockTimestamp:
                    type: integer
                    nullable: true
                    description: Optional Unix timestamp override for the configured genesis block.

        CollectionStandard:
            type: string
            enum: [erc721, erc1155]

        CollectionStatus:
            type: string
            enum: [bootstrapping, live, paused, disabled]

        CollectionTokenScopeSummary:
            type: object
            required: [label, items]
            additionalProperties: false
            properties:
                label:
                    type: string
                items:
                    type: array
                    items:
                        $ref: "#/components/schemas/CollectionTokenScopeSummaryItem"

        CollectionTokenScopeSummaryItem:
            type: object
            required: [label, value]
            additionalProperties: false
            properties:
                label:
                    type: string
                value:
                    type: string

        CollectionListItem:
            type: object
            required:
                - chainId
                - collectionId
                - slug
                - address
                - standard
                - status
                - deploymentBlock
                - bootstrapAnchorBlock
                - createdAt
                - updatedAt
            additionalProperties: false
            properties:
                chainId:
                    type: integer
                collectionId:
                    type: integer
                slug:
                    type: string
                address:
                    type: string
                standard:
                    $ref: "#/components/schemas/CollectionStandard"
                status:
                    $ref: "#/components/schemas/CollectionStatus"
                deploymentBlock:
                    type: integer
                    nullable: true
                bootstrapAnchorBlock:
                    type: integer
                    nullable: true
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time
                tokenScope:
                    $ref: "#/components/schemas/CollectionTokenScopeSummary"
                activityEventFeeds:
                    type: array
                    items:
                        $ref: "#/components/schemas/ActivityExtensionEventFeed"

        PurgeCollectionRequest:
            type: object
            required: [confirmation]
            additionalProperties: false
            properties:
                confirmation:
                    type: string

        CollectionPurgeDeletedRowCount:
            type: object
            required: [table, rowCount]
            additionalProperties: false
            properties:
                table:
                    type: string
                rowCount:
                    type: integer

        PurgeCollectionResponse:
            type: object
            required: [chain, collection, deletedRows, totalDeletedRows]
            additionalProperties: false
            properties:
                chain:
                    $ref: "#/components/schemas/Chain"
                collection:
                    $ref: "#/components/schemas/CollectionListItem"
