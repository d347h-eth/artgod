[[settings]]
key = "ARTGOD_DB_PATH"
group = "chain-rpc"
label = "artgod db path"
defaults = { local = "database/sqlite/main/db", deploy = "/data/sqlite/main/db", desktop = "sqlite/main/db" }
help = "SQLite database file path; desktop relative paths resolve from app data."

[[settings]]
key = "BACKEND_HOST"
group = "backend"
label = "backend host"
defaults = { local = "127.0.0.1", deploy = "0.0.0.0", desktop = "127.0.0.1" }
help = "Network interface the backend listens on; keep localhost for desktop and local use."

[[settings]]
key = "BACKEND_PORT"
group = "backend"
label = "backend port"
default = "42710"
help = "Port for the local backend API and userland web server."

[[settings]]
key = "BACKEND_ALLOWED_HOSTS"
group = "backend"
label = "backend allowed hosts"
default = "127.0.0.1,localhost,::1"
help = "Comma-separated Host headers accepted by the backend."

[[settings]]
key = "BACKEND_ALLOWED_ORIGINS"
group = "backend"
label = "backend allowed origins"
defaults = { local = "http://127.0.0.1:42710,http://localhost:42710,http://127.0.0.1:42701,http://localhost:42701,http://tauri.localhost,tauri://localhost", deploy = "http://127.0.0.1:42710,http://localhost:42710", desktop = "http://127.0.0.1:42710,http://localhost:42710,http://127.0.0.1:42701,http://localhost:42701,http://tauri.localhost,tauri://localhost" }
help = "Comma-separated browser origins allowed to make authenticated backend requests."

[[settings]]
key = "BACKEND_CSRF_COOKIE_SECURE"
group = "backend"
label = "backend csrf cookie secure"
defaults = { local = "false", deploy = "true", desktop = "false" }
input = "checkbox"
help = "Requires the CSRF cookie to be sent only over HTTPS; enable for public HTTPS deploys."

[[settings]]
key = "BACKEND_QUERY_CACHE_PROVIDER"
group = "backend-cache"
label = "backend query cache provider"
defaults = { local = "disabled", deploy = "memory", desktop = "disabled" }
input = "select"
options = ["disabled", "memory"]
help = "Selects the backend read-query cache; memory helps public read-heavy pages, while disabled keeps reads uncached."

[[settings]]
key = "BACKEND_QUERY_CACHE_TOKEN_PREVIEW_MAX_ENTRIES"
group = "backend-cache"
label = "backend query cache token preview max entries"
default = "250"
help = "Maximum token-preview responses kept in the backend memory cache."

[[settings]]
key = "BACKEND_QUERY_CACHE_TOKEN_PREVIEW_FRESH_MS"
group = "backend-cache"
label = "backend query cache token preview fresh ms"
default = "600000"
help = "How long cached token previews are served as fresh before background refresh is considered."

[[settings]]
key = "BACKEND_QUERY_CACHE_TOKEN_PREVIEW_STALE_MS"
group = "backend-cache"
label = "backend query cache token preview stale ms"
default = "1200000"
help = "How long cached token previews may be served while a replacement is warming."

[[settings]]
key = "BACKEND_QUERY_CACHE_TOKEN_PREVIEW_WARMUP_CONCURRENCY"
group = "backend-cache"
label = "backend query cache token preview warmup concurrency"
default = "3"
help = "How many token previews the backend warms in parallel after cached collection refreshes."

[[settings]]
key = "BACKEND_PUBLIC_COLLECTION_CACHE_REFRESH_MS"
group = "backend-cache"
label = "backend public collection cache refresh ms"
default = "30000"
help = "How often the backend refreshes the cached public collection page."

[[settings]]
key = "BACKEND_PUBLIC_COLLECTION_PREVIEW_WARM_REFRESH_MS"
group = "backend-cache"
label = "backend public collection preview warm refresh ms"
default = "600000"
help = "How often the backend warms token previews for the cached public collection page."

[[settings]]
key = "BACKEND_PUBLIC_BLOCKSPACE_CACHE_REFRESH_MS"
group = "backend"
label = "backend public blockspace cache refresh ms"
default = "60000"
help = "How often the backend refreshes cached public blockspace data."

[[settings]]
key = "BACKEND_METRICS_ENABLED"
group = "backend-observability"
label = "backend metrics enabled"
default = "false"
input = "checkbox"
help = "Enables the backend Prometheus metrics endpoint."

[[settings]]
key = "BACKEND_METRICS_HOST"
group = "backend-observability"
label = "backend metrics host"
default = "0.0.0.0"
help = "Network interface for the backend metrics endpoint."

[[settings]]
key = "BACKEND_METRICS_PORT"
group = "backend-observability"
label = "backend metrics port"
default = "42740"
help = "Port for the backend Prometheus metrics endpoint."

[[settings]]
key = "BACKEND_APM_ENABLED"
group = "backend-observability"
label = "backend apm enabled"
default = "false"
input = "checkbox"
help = "Enables backend tracing and profiling exporters."

[[settings]]
key = "BACKEND_APM_SERVICE_NAMESPACE"
group = "backend-observability"
label = "backend apm service namespace"
default = "artgod.backend"
help = "Service namespace used to group backend APM signals."

[[settings]]
key = "BACKEND_APM_OTLP_HTTP_URL"
group = "backend-observability"
label = "backend apm otlp http url"
default = ""
validation = "url"
help = "Optional backend-specific OTLP HTTP trace endpoint; blank uses the shared observability endpoint."

[[settings]]
key = "BACKEND_APM_PYROSCOPE_URL"
group = "backend-observability"
label = "backend apm pyroscope url"
default = ""
validation = "url"
help = "Optional backend-specific Pyroscope profiling endpoint; blank uses the shared observability endpoint."

[[settings]]
key = "BACKEND_APM_SPAN_PROFILES_ENABLED"
group = "backend-observability"
label = "backend apm span profiles enabled"
default = "true"
input = "checkbox"
help = "Links backend span context to profiling samples when tracing and profiling are enabled."

[[settings]]
key = "BACKEND_APM_TRACES_ENABLED"
group = "backend-observability"
label = "backend apm traces enabled"
default = "true"
input = "checkbox"
help = "Exports backend traces to the configured OTLP endpoint when APM is enabled."

[[settings]]
key = "BACKEND_APM_PROFILES_ENABLED"
group = "backend-observability"
label = "backend apm profiles enabled"
default = "true"
input = "checkbox"
help = "Exports backend CPU profiles to the configured Pyroscope endpoint when APM is enabled."

[[settings]]
key = "PUBLIC_BACKEND_ORIGIN"
group = "public-deployment"
label = "public backend origin"
defaults = { local = "http://127.0.0.1:42710", deploy = "https://terraforms.artgod.network" }
targets = ["local", "deploy"]
validation = "url"
desktop_managed = false
help = "Public browser origin for the backend API in hosted web deployments."

[[settings]]
key = "INTERNAL_BACKEND_ORIGIN"
group = "public-deployment"
label = "internal backend origin"
defaults = { local = "", deploy = "http://backend:42710" }
targets = ["local", "deploy"]
validation = "url"
desktop_managed = false
help = "Private service origin used by server-side frontend code to reach the backend."

[[settings]]
key = "PUBLIC_APP_DEPLOYMENT_MODE"
group = "public-deployment"
label = "public app deployment mode"
defaults = { local = "standard", deploy = "public_single_collection" }
targets = ["local", "deploy"]
input = "select"
options = ["standard", "public_single_collection"]
desktop_managed = false
help = "Selects standard multi-collection UI or public single-collection mode for hosted builds."

[[settings]]
key = "PUBLIC_APP_CHAIN_REF"
group = "public-deployment"
label = "public app chain ref"
defaults = { local = "", deploy = "ethereum" }
targets = ["local", "deploy"]
desktop_managed = false
help = "Chain reference used by public single-collection mode."

[[settings]]
key = "PUBLIC_APP_COLLECTION_REF"
group = "public-deployment"
label = "public app collection ref"
defaults = { local = "", deploy = "terraforms" }
targets = ["local", "deploy"]
desktop_managed = false
help = "Collection reference used by public single-collection mode."

[[settings]]
key = "PUBLIC_SITE_HOST"
group = "deploy"
label = "public site host"
defaults = { deploy = "terraforms.artgod.network" }
targets = ["deploy"]
help = "Public hostname served by the bundled deploy Caddy profile."

[[settings]]
key = "PUBLIC_EDGE_NETWORK"
group = "deploy"
label = "public edge network"
defaults = { deploy = "public-edge" }
targets = ["deploy"]
help = "Docker network name shared with the public edge reverse proxy."

[[settings]]
key = "ETHEREUM_RPC_NETWORK"
group = "deploy"
label = "ethereum rpc network"
defaults = { deploy = "ethereum-rpc" }
targets = ["deploy"]
help = "Docker network name shared with the Ethereum RPC service."

[[settings]]
key = "OBSERVABILITY_GRAFANA_HOST_BIND_IP"
group = "deploy"
label = "observability grafana host bind ip"
defaults = { deploy = "10.77.0.1" }
targets = ["deploy"]
help = "Private host interface for exposing deploy Grafana."

[[settings]]
key = "OBSERVABILITY_GRAFANA_HOST_BIND_PORT"
group = "deploy"
label = "observability grafana host bind port"
defaults = { deploy = "42735" }
targets = ["deploy"]
help = "Private host port for exposing deploy Grafana."

[[settings]]
key = "OBSERVABILITY_GRAFANA_ADMIN_USER"
group = "deploy"
label = "observability grafana admin user"
defaults = { deploy = "admin" }
targets = ["deploy"]
help = "Initial Grafana admin username for the deploy observability profile."

[[settings]]
key = "OBSERVABILITY_GRAFANA_ADMIN_PASSWORD"
group = "deploy"
label = "observability grafana admin password"
defaults = { deploy = "change-me-before-exposing" }
targets = ["deploy"]
secret = true
help = "Initial Grafana admin password; change before exposing Grafana beyond a trusted interface."

[[settings]]
key = "USERLAND_UI_DIST_DIR"
group = "desktop-runtime"
label = "userland ui dist dir"
defaults = { local = "", desktop = "frontend/userland" }
targets = ["local", "desktop"]
help = "Directory containing the built userland UI served by the backend."

[[settings]]
key = "DESKTOP_RESTART_BACKOFF_MS"
group = "desktop-runtime"
label = "desktop restart backoff ms"
default = "1500"
targets = ["local", "desktop"]
help = "Delay before the desktop supervisor restarts the core runtime after a crash."

[[settings]]
key = "DESKTOP_LOG_RETENTION_HOURS"
group = "desktop-runtime"
label = "desktop log retention hours"
default = "48"
targets = ["local", "desktop"]
help = "How long desktop app-data log files are retained; logs rotate by UTC day."
validation = "positive_integer"

[[settings]]
key = "DESKTOP_WALLET_STORE_DIR"
group = "desktop-runtime"
label = "desktop wallet store dir"
default = "wallets"
targets = ["local", "desktop"]
help = "Directory where desktop stores encrypted wallet keystore files."

[[settings]]
key = "DESKTOP_BOT_UNLOCK_STABILIZATION_DELAY_MS"
group = "desktop-runtime"
label = "desktop bot unlock stabilization delay ms"
default = "5000"
targets = ["local", "desktop"]
help = "How long the core runtime must stay healthy before Admin shows a bot unlock prompt."

[[settings]]
key = "CHAIN_ID"
group = "chain-rpc"
label = "chain id"
default = "1"
help = "EVM chain ID used by backend, indexer, and trading runtimes."

[[settings]]
key = "RPC_URL_LIST"
group = "chain-rpc"
label = "rpc endpoints"
defaults = { local = "", deploy = "[{\"url\":\"http://ethereum-rpc:8545\",\"weight\":1}]", desktop = "" }
help = "Weighted Ethereum HTTP JSON-RPC endpoints used by backend, indexer, and trading runtimes."
input = "weighted_endpoint_list"
required_for_launch = true
validation = "rpc_endpoint_list"
view = "basic"

[[settings]]
key = "RPC_AUTO_SOURCING_TRACKING_POLICY"
group = "chain-rpc"
label = "auto rpc tracking policy"
default = "none"
targets = ["desktop"]
help = "Privacy filter for Admin Chainlist RPC sourcing; stricter policies exclude endpoints with more tracking."
input = "select"
options = ["none", "limited", "all"]
view = "basic"

[[settings]]
key = "RPC_BACKFILL_URL_LIST"
group = "chain-rpc"
label = "rpc backfill endpoints"
default = ""
help = "Optional weighted HTTP JSON-RPC endpoints used only for historical backfill jobs."
input = "weighted_endpoint_list"
validation = "rpc_endpoint_list"

[[settings]]
key = "RPC_WS_URL_LIST"
group = "chain-rpc"
label = "rpc ws endpoints"
defaults = { local = "", deploy = "[{\"url\":\"ws://ethereum-rpc:8546\",\"weight\":1}]", desktop = "" }
help = "Optional weighted WebSocket JSON-RPC endpoints for faster new-block detection."
input = "weighted_endpoint_list"
validation = "websocket_endpoint_list"
view = "basic"

[[settings]]
key = "RPC_HTTP_REQUEST_TIMEOUT_MS"
group = "chain-rpc"
label = "rpc http request timeout ms"
default = "10000"
help = "Per-attempt timeout for HTTP JSON-RPC requests."
validation = "positive_integer"
view = "basic"

[[settings]]
key = "RPC_RETRY_MAX_ATTEMPTS"
group = "chain-rpc"
label = "rpc retry max attempts"
default = "10"
help = "Maximum HTTP JSON-RPC retry attempts before the request fails."
view = "basic"

[[settings]]
key = "RPC_RETRY_BASE_DELAY_MS"
group = "chain-rpc"
label = "rpc retry base delay ms"
default = "500"
help = "Initial backoff delay between HTTP JSON-RPC retry attempts."
view = "basic"

[[settings]]
key = "RPC_RETRY_MAX_DELAY_MS"
group = "chain-rpc"
label = "rpc retry max delay ms"
default = "10000"
help = "Maximum backoff delay between HTTP JSON-RPC retry attempts."
view = "basic"

[[settings]]
key = "RPC_RATE_LIMIT_REQUESTS_PER_SECOND"
group = "chain-rpc"
label = "rpc rate limit requests per second"
defaults = { local = "5", deploy = "50", desktop = "5" }
help = "Maximum HTTP JSON-RPC requests per endpoint each second; 0 disables throttling."
view = "basic"

[[settings]]
key = "RPC_RATE_LIMIT_BURST"
group = "chain-rpc"
label = "rpc rate limit burst"
defaults = { local = "5", deploy = "50", desktop = "5" }
help = "Burst capacity for each endpoint's HTTP JSON-RPC rate limiter."
view = "basic"

[[settings]]
key = "RPC_CIRCUIT_BREAKER_FAILURE_THRESHOLD"
group = "chain-rpc"
label = "rpc circuit breaker failure threshold"
default = "5"
help = "Consecutive endpoint failures before the HTTP JSON-RPC circuit opens."

[[settings]]
key = "RPC_CIRCUIT_BREAKER_OPEN_MS"
group = "chain-rpc"
label = "rpc circuit breaker open ms"
default = "5000"
help = "How long an unhealthy HTTP JSON-RPC endpoint is paused before trial requests resume."

[[settings]]
key = "RPC_CIRCUIT_BREAKER_HALF_OPEN_MAX_REQUESTS"
group = "chain-rpc"
label = "rpc circuit breaker half open max requests"
default = "2"
help = "Trial request count allowed while a paused HTTP JSON-RPC endpoint is recovering."

[[settings]]
key = "BLOCK_EXPLORER_BASE_URL"
group = "chain-rpc"
label = "block explorer URL base"
default = "https://etherscan.io"
help = "Base explorer URL used for lookup links."
validation = "block_explorer_base_url"
view = "basic"

[[settings]]
key = "BLOCK_EXPLORER_TX_PATH_TEMPLATE"
group = "chain-rpc"
label = "transaction lookup path"
default = "/tx/{tx_hash}"
help = "Transaction lookup path; include {tx_hash}."
validation = "block_explorer_tx_path_template"
view = "basic"

[[settings]]
key = "BLOCK_EXPLORER_ADDRESS_PATH_TEMPLATE"
group = "chain-rpc"
label = "address lookup path"
default = "/address/{address}"
help = "Address lookup path; include {address}."
validation = "block_explorer_address_path_template"
view = "basic"

[[settings]]
key = "BLOCK_EXPLORER_BLOCK_PATH_TEMPLATE"
group = "chain-rpc"
label = "block lookup path"
default = "/block/{block_number}"
help = "Block lookup path; include {block_number}."
validation = "block_explorer_block_path_template"
view = "basic"

[[settings]]
key = "CACHE_MAX_ENTRIES"
group = "indexer"
label = "cache max entries"
default = "5000"
help = "Maximum entries in the indexer in-memory helper cache."

[[settings]]
key = "CACHE_TTL_MS"
group = "indexer"
label = "cache ttl ms"
default = "30000"
help = "How long indexer in-memory helper cache entries remain valid."

[[settings]]
key = "OFFCHAIN_PERSIST_RAW_OBSERVATIONS"
group = "indexer"
label = "offchain persist raw observations"
