[[settings]]
key = "RPC_URL_LIST"
group = "chain-rpc"
label = "rpc endpoints"
defaults = { local = "", deploy = "[{\"url\":\"http://ethereum-rpc:8545\",\"weight\":1}]", desktop = "" }
help = "JSON array of Ethereum HTTP JSON-RPC endpoints used by backend, indexer, and trading runtimes. Each endpoint has a positive weight."
input = "weighted_endpoint_list"
required_for_launch = true
validation = "rpc_endpoint_list"
view = "basic"

[[settings]]
key = "RPC_AUTO_SOURCING_TRACKING_POLICY"
group = "chain-rpc"
label = "auto rpc tracking policy"
default = "none"
targets = ["desktop"]
help = "Privacy filter used when Admin sources public RPC endpoints from Chainlist. none includes only providers declaring no tracking; limited also includes functional/rate-limit tracking; all includes every concrete HTTP endpoint."
input = "select"
options = ["none", "limited", "all"]
view = "basic"

[[settings]]
key = "RPC_BACKFILL_URL_LIST"
group = "chain-rpc"
label = "rpc backfill endpoints"
default = ""
help = "Optional JSON array of HTTP JSON-RPC endpoints used for backfill sync jobs; realtime sync keeps using RPC_URL_LIST."
