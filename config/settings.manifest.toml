validation = "rpc_endpoint_list"

[[settings]]
key = "RPC_WS_URL_LIST"
group = "chain-rpc"
label = "rpc ws endpoints"
defaults = { local = "", deploy = "[{\"url\":\"ws://ethereum-rpc:8546\",\"weight\":1}]", desktop = "" }
help = "Optional JSON array of weighted WebSocket RPC endpoints used to listen for new blocks faster and more cheaply, alongside periodic new-block polling."
input = "weighted_endpoint_list"
validation = "websocket_endpoint_list"
view = "basic"

