input = "checkbox"
help = "Stores large raw metadata/order debug payloads in SQLite; keep disabled unless debugging normalization."

[[settings]]
key = "COMMON_IPFS_GATEWAY_ORIGIN"
group = "indexer"
label = "common ipfs gateway origin"
default = "https://ipfs.io"
