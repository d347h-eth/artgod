name: Tauri Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write
    id-token: write
    attestations: write

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      rust_targets: x86_64-unknown-linux-gnu
                      node_dist_target: linux-x64
                      bundles: appimage,deb
                      artifact_name: artgod-linux-x64
                    - os: windows-latest
                      target: x86_64-pc-windows-msvc
                      rust_targets: x86_64-pc-windows-msvc
                      node_dist_target: win-x64
                      bundles: nsis
                      artifact_name: artgod-windows-x64
                    - os: macos-latest
                      target: universal-apple-darwin
                      rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
                      node_dist_target: darwin-universal
                      bundles: dmg
                      artifact_name: artgod-macos-universal

        runs-on: ${{ matrix.os }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24.3.0

            - name: Enable Corepack
              run: corepack enable

            - name: Cache Yarn local artifacts
              uses: actions/cache@v4
              with:
                  path: |
                      .yarn/cache
                      .yarn/unplugged
                      .cache/desktop-node-runtime
                      .cache/desktop-nats-runtime
                  key: ${{ runner.os }}-yarn-local-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}
                  restore-keys: |
                      ${{ runner.os }}-yarn-local-

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.rust_targets }}

            - name: Install Linux build dependencies
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                      libwebkit2gtk-4.1-dev \
                      libgtk-3-dev \
                      libayatana-appindicator3-dev \
                      librsvg2-dev \
                      patchelf

            - name: Install workspace dependencies
              env:
                  YARN_ENABLE_SCRIPTS: true
              run: yarn install --immutable

            - name: Check desktop runtime registry consistency
              run: yarn check:runtime-registry

            - name: Build Tauri bundle
              env:
                  DESKTOP_NODE_DIST_TARGET: ${{ matrix.node_dist_target }}
                  DESKTOP_NATS_DIST_TARGET: ${{ matrix.node_dist_target }}
              run: yarn tauri build --ci --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

            - name: Verify bundled Yarn runtime dependencies
              shell: bash
              run: |
                  set -euo pipefail
                  test -d src-tauri/resources/runtime/.yarn/cache
                  test -d src-tauri/resources/runtime/.yarn/unplugged
                  test -f src-tauri/resources/runtime/.yarn/install-state.gz
                  test -f src-tauri/resources/runtime/.pnp.cjs
                  test -f src-tauri/resources/runtime/.pnp.loader.mjs
                  if [ "${{ runner.os }}" = "Windows" ]; then
                    test -f src-tauri/resources/runtime/node/node.exe
                    test -f src-tauri/resources/runtime/nats/nats-server.exe
                  else
                    test -f src-tauri/resources/runtime/node/node
                    test -f src-tauri/resources/runtime/nats/nats-server
                  fi

            - name: Collect release artifacts
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p release-assets
                  find "src-tauri/target/${{ matrix.target }}/release/bundle" -type f \
                    \( -name "*.AppImage" -o -name "*.deb" -o -name "*.dmg" -o -name "*.msi" -o -name "*.exe" -o -name "*.app.tar.gz" \) \
                    -exec cp {} release-assets/ \;
                  if [ -z "$(ls -A release-assets)" ]; then
                    echo "No bundle artifacts found"
                    exit 1
                  fi

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact_name }}
                  path: release-assets/*

    release:
        needs: build
        runs-on: ubuntu-latest

        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: release-assets

            - name: Generate checksums
              shell: bash
              run: |
                  set -euo pipefail
                  find release-assets -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

            - name: Publish GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      release-assets/**
                      SHA256SUMS.txt

            - name: Attest release artifacts
              uses: actions/attest-build-provenance@v2
              with:
                  subject-path: |
                      release-assets/**/*.AppImage
                      release-assets/**/*.deb
                      release-assets/**/*.dmg
                      release-assets/**/*.msi
                      release-assets/**/*.exe
                      release-assets/**/*.app.tar.gz
