name: Tauri Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            source_run_id:
                description: "Failed tag workflow run containing the preserved macOS notarization artifacts"
                required: true
                type: string

permissions:
    contents: read

env:
    DESKTOP_LINUX_ARTIFACT_NAME: artgod-linux-x64
    DESKTOP_MACOS_ARTIFACT_NAME: artgod-macos-universal
    DESKTOP_RELEASE_READY_ARTIFACT_NAME: artgod-desktop-release-ready
    MACOS_NOTARIZATION_INPUT_ARTIFACT_NAME: artgod-macos-notarization-input
    MACOS_NOTARIZATION_STATE_ARTIFACT_NAME: artgod-macos-notarization-state
    MACOS_NOTARIZATION_DIAGNOSTICS_ARTIFACT_NAME: artgod-macos-notarization-diagnostics
    MACOS_NOTARIZATION_ARTIFACT_RETENTION_DAYS: 30
    MACOS_ARTIFACT_COMPRESSION_LEVEL: 0
    ARTIFACT_MISSING_FILE_BEHAVIOR: error
    MACOS_RELEASE_ASSET_DIR: release-assets
    MACOS_NOTARIZATION_STATE_DIR: release-state/macos
    MACOS_SIGNING_CERTIFICATE_FILE_NAME: apple-signing-certificate.p12
    MACOS_SIGNING_KEYCHAIN_FILE_NAME: artgod-build.keychain-db

jobs:
    dependency-security:
        if: github.event_name == 'push'
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
              with:
                  persist-credentials: false
                  fetch-depth: 0

            - name: Setup Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version-file: package.json

            - name: Validate signed release tag admission
              run: node ./scripts/build/desktop-release-admission.mjs validate
              env:
                  GITHUB_TOKEN: ${{ github.token }}

            - name: Enable Corepack
              run: corepack enable

            - name: Cache Yarn local artifacts
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
              with:
                  path: |
                      .yarn/cache
                      .yarn/unplugged
                  key: ${{ runner.os }}-yarn-security-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}
                  restore-keys: |
                      ${{ runner.os }}-yarn-security-

            - name: Prepare Yarn project state for security aliases
              run: yarn install --immutable --mode=skip-build

            - name: Verify Yarn lockfile metadata
              run: yarn security:yarn:verify-lockfile

            - name: Audit Node dependency advisories
              run: yarn security:yarn:audit

            - name: Check Cargo dependency age gate
              run: yarn cargo:age-gate

            - name: Test desktop release security
              run: yarn test:desktop:release

    build:
        if: github.event_name == 'push'
        needs: dependency-security

        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-22.04
                      target: x86_64-unknown-linux-gnu
                      rust_targets: x86_64-unknown-linux-gnu
                      node_dist_target: linux-x64
                      bundles: appimage,deb
                    - os: macos-latest
                      target: universal-apple-darwin
                      rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
                      node_dist_target: darwin-universal
                      bundles: dmg

        runs-on: ${{ matrix.os }}
        environment: desktop-release-signing

        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
              with:
                  persist-credentials: false

            - name: Setup Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version: 24.3.0

            - name: Enable Corepack
              run: corepack enable

            - name: Cache Yarn local artifacts
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
              with:
                  path: |
                      .yarn/cache
                      .yarn/unplugged
                      .cache/desktop-node-runtime
                      .cache/desktop-nats-runtime
                  key: ${{ runner.os }}-yarn-local-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}
                  restore-keys: |
                      ${{ runner.os }}-yarn-local-

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-07-10
              with:
                  toolchain: 1.93.1
                  targets: ${{ matrix.rust_targets }}

            - name: Install Linux build dependencies
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                      libwebkit2gtk-4.1-dev \
                      libgtk-3-dev \
                      libayatana-appindicator3-dev \
                      librsvg2-dev \
                      libfuse2 \
                      libssl-dev \
                      libxdo-dev \
                      patchelf \
                      file \
                      xdg-utils \
                      python3 \
                      make \
                      g++

            - name: Install workspace dependencies
              run: yarn install --immutable

            - name: Build trusted native SQLite dependency
              run: yarn build:sqlite-native

            - name: Check desktop runtime registry consistency
              run: yarn check:runtime-registry

            - name: Validate macOS signing and notarization secrets
              if: runner.os == 'macOS'
              shell: bash
              run: |
                  set -euo pipefail
                  missing=0
                  for key in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_API_KEY_P8_B64 APPLE_API_KEY_ID APPLE_API_ISSUER; do
                    if [ -z "${!key:-}" ]; then
                      echo "Missing required secret: $key"
                      missing=1
                    fi
                  done
                  if [ "$missing" -ne 0 ]; then
                    exit 1
                  fi
              env:
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
                  APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8_B64 }}
                  APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
                  APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

            - name: Prepare macOS signing keychain
              if: runner.os == 'macOS'
              shell: bash
              run: |
                  set -euo pipefail
                  umask 077
                  CERT_PATH="$RUNNER_TEMP/$MACOS_SIGNING_CERTIFICATE_FILE_NAME"
                  KEYCHAIN_PATH="$RUNNER_TEMP/$MACOS_SIGNING_KEYCHAIN_FILE_NAME"
                  KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
                  echo "::add-mask::$KEYCHAIN_PASSWORD"

                  printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
                  chmod 600 "$CERT_PATH"

                  security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
                  chmod 600 "$KEYCHAIN_PATH"
                  security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
                  security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
                  security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -A
                  rm -f "$CERT_PATH"
                  security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
                  security list-keychains -d user -s "$KEYCHAIN_PATH"
                  security default-keychain -d user -s "$KEYCHAIN_PATH"

                  echo "APPLE_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
              env:
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

            - name: Build Linux Tauri bundle
              if: runner.os == 'Linux'
              env:
                  DESKTOP_NODE_DIST_TARGET: ${{ matrix.node_dist_target }}
                  DESKTOP_NATS_DIST_TARGET: ${{ matrix.node_dist_target }}
                  APPIMAGE_EXTRACT_AND_RUN: "1"
              run: |
                  yarn prepare:tauri-linux-tools
                  yarn tauri build --ci --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

            - name: Build macOS Tauri bundle
              if: runner.os == 'macOS'
              env:
                  DESKTOP_NODE_DIST_TARGET: ${{ matrix.node_dist_target }}
                  DESKTOP_NATS_DIST_TARGET: ${{ matrix.node_dist_target }}
                  APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
              run: yarn tauri build --ci --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

            - name: Remove temporary macOS signing credentials
              if: ${{ runner.os == 'macOS' && always() }}
              shell: bash
              run: |
                  set -euo pipefail
                  CERT_PATH="$RUNNER_TEMP/$MACOS_SIGNING_CERTIFICATE_FILE_NAME"
                  KEYCHAIN_PATH="${APPLE_KEYCHAIN_PATH:-$RUNNER_TEMP/$MACOS_SIGNING_KEYCHAIN_FILE_NAME}"
                  if [ -e "$KEYCHAIN_PATH" ]; then
                    security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
                  fi
                  rm -f "$CERT_PATH" "$KEYCHAIN_PATH"
                  test ! -e "$CERT_PATH"
                  test ! -e "$KEYCHAIN_PATH"

            - name: Verify bundled Yarn runtime dependencies
              shell: bash
              run: |
                  set -euo pipefail
                  test -d src-tauri/resources/runtime/.yarn/cache
                  test -d src-tauri/resources/runtime/.yarn/unplugged
                  test -f src-tauri/resources/runtime/.yarn/install-state.gz
                  test -f src-tauri/resources/runtime/.pnp.cjs
                  test -f src-tauri/resources/runtime/.pnp.loader.mjs
                  test -f src-tauri/resources/runtime/node/node
                  test -f src-tauri/resources/runtime/nats/nats-server

            - name: Verify macOS code signing
              if: runner.os == 'macOS'
              shell: bash
              run: |
                  set -euo pipefail
                  node ./scripts/build/macos-code-signing.mjs verify-dmg "src-tauri/target/${{ matrix.target }}/release/bundle/dmg"

            - name: Collect release artifacts
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p release-assets
                  find "src-tauri/target/${{ matrix.target }}/release/bundle" -type f \
                    \( -name "*.AppImage" -o -name "*.deb" -o -name "*.dmg" -o -name "*.app.tar.gz" \) \
                    -exec cp {} release-assets/ \;
                  if [ -z "$(ls -A release-assets)" ]; then
                    echo "No bundle artifacts found"
                    exit 1
                  fi

            - name: Prepare macOS notarization input
              if: runner.os == 'macOS'
              shell: bash
              run: node ./scripts/build/macos-notarization.mjs prepare "$MACOS_RELEASE_ASSET_DIR" "$MACOS_NOTARIZATION_STATE_DIR"

            - name: Preserve macOS notarization input
              if: runner.os == 'macOS'
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: ${{ env.MACOS_NOTARIZATION_INPUT_ARTIFACT_NAME }}
                  path: ${{ env.MACOS_RELEASE_ASSET_DIR }}/*.dmg
                  retention-days: ${{ env.MACOS_NOTARIZATION_ARTIFACT_RETENTION_DAYS }}
                  compression-level: ${{ env.MACOS_ARTIFACT_COMPRESSION_LEVEL }}
                  if-no-files-found: ${{ env.ARTIFACT_MISSING_FILE_BEHAVIOR }}

            - name: Submit macOS DMG for notarization
              if: runner.os == 'macOS'
              shell: bash
              run: node ./scripts/build/macos-notarization.mjs submit "$MACOS_RELEASE_ASSET_DIR" "$MACOS_NOTARIZATION_STATE_DIR"
              env:
                  APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8_B64 }}
                  APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
                  APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

            - name: Preserve macOS notarization submission state
              if: ${{ runner.os == 'macOS' && always() }}
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: ${{ env.MACOS_NOTARIZATION_STATE_ARTIFACT_NAME }}
                  path: ${{ env.MACOS_NOTARIZATION_STATE_DIR }}
                  retention-days: ${{ env.MACOS_NOTARIZATION_ARTIFACT_RETENTION_DAYS }}
                  if-no-files-found: ${{ env.ARTIFACT_MISSING_FILE_BEHAVIOR }}

            - name: Poll, verify, and staple macOS DMG
              if: runner.os == 'macOS'
              shell: bash
              run: node ./scripts/build/macos-notarization.mjs poll "$MACOS_RELEASE_ASSET_DIR" "$MACOS_NOTARIZATION_STATE_DIR"
              env:
                  APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8_B64 }}
                  APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
                  APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

            - name: Preserve macOS notarization diagnostics
              if: ${{ runner.os == 'macOS' && always() }}
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: ${{ env.MACOS_NOTARIZATION_DIAGNOSTICS_ARTIFACT_NAME }}
                  path: ${{ env.MACOS_NOTARIZATION_STATE_DIR }}
                  retention-days: ${{ env.MACOS_NOTARIZATION_ARTIFACT_RETENTION_DAYS }}
                  if-no-files-found: ${{ env.ARTIFACT_MISSING_FILE_BEHAVIOR }}

            - name: Sign and verify Linux release artifacts
              if: runner.os == 'Linux'
              run: node ./scripts/build/linux-gpg-signing.mjs sign-bundles release-assets
              env:
                  LINUX_GPG_PRIVATE_KEY_ASC: ${{ secrets.LINUX_GPG_PRIVATE_KEY_ASC }}
                  LINUX_GPG_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
                  LINUX_GPG_KEY_ID: ${{ secrets.LINUX_GPG_KEY_ID }}
                  LINUX_GPG_OWNERTRUST: ${{ secrets.LINUX_GPG_OWNERTRUST }}

            - name: Upload Linux build artifacts
              if: runner.os == 'Linux'
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: ${{ env.DESKTOP_LINUX_ARTIFACT_NAME }}
                  path: release-assets/*
                  if-no-files-found: ${{ env.ARTIFACT_MISSING_FILE_BEHAVIOR }}

            - name: Upload macOS build artifacts
              if: runner.os == 'macOS'
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: ${{ env.DESKTOP_MACOS_ARTIFACT_NAME }}
                  path: release-assets/*
                  compression-level: ${{ env.MACOS_ARTIFACT_COMPRESSION_LEVEL }}
                  if-no-files-found: ${{ env.ARTIFACT_MISSING_FILE_BEHAVIOR }}

    resume-macos-notarization:
        if: github.event_name == 'workflow_dispatch'
        runs-on: macos-latest
        environment: desktop-release-signing
        permissions:
            actions: read
            contents: read

        steps:
            - name: Checkout release tag
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
              with:
                  persist-credentials: false
                  fetch-depth: 0

            - name: Setup Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version-file: package.json

            - name: Validate signed release tag admission
              run: node ./scripts/build/desktop-release-admission.mjs validate
              env:
                  GITHUB_TOKEN: ${{ github.token }}

            - name: Validate macOS notarization secrets
              shell: bash
              run: |
                  set -euo pipefail
                  missing=0
                  for key in APPLE_API_KEY_P8_B64 APPLE_API_KEY_ID APPLE_API_ISSUER; do
                    if [ -z "${!key:-}" ]; then
                      echo "Missing required secret: $key"
                      missing=1
                    fi
                  done
                  if [ "$missing" -ne 0 ]; then
                    exit 1
                  fi
              env:
                  APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8_B64 }}
                  APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
                  APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

            - name: Download preserved macOS notarization input
              uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
              with:
                  name: ${{ env.MACOS_NOTARIZATION_INPUT_ARTIFACT_NAME }}
                  path: ${{ env.MACOS_RELEASE_ASSET_DIR }}
                  github-token: ${{ github.token }}
                  run-id: ${{ inputs.source_run_id }}

            - name: Download preserved macOS notarization state
              uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
              with:
                  name: ${{ env.MACOS_NOTARIZATION_STATE_ARTIFACT_NAME }}
                  path: ${{ env.MACOS_NOTARIZATION_STATE_DIR }}
                  github-token: ${{ github.token }}
                  run-id: ${{ inputs.source_run_id }}

            - name: Finalize accepted macOS notarization
              shell: bash
              run: node ./scripts/build/macos-notarization.mjs finalize "$MACOS_RELEASE_ASSET_DIR" "$MACOS_NOTARIZATION_STATE_DIR"
              env:
                  APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8_B64 }}
                  APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
                  APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
                  MACOS_NOTARIZATION_SOURCE_RUN_ID: ${{ inputs.source_run_id }}

            - name: Preserve resumed macOS notarization state
              if: always()
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: ${{ env.MACOS_NOTARIZATION_DIAGNOSTICS_ARTIFACT_NAME }}
                  path: ${{ env.MACOS_NOTARIZATION_STATE_DIR }}
                  retention-days: ${{ env.MACOS_NOTARIZATION_ARTIFACT_RETENTION_DAYS }}
                  if-no-files-found: ${{ env.ARTIFACT_MISSING_FILE_BEHAVIOR }}

            - name: Upload finalized macOS build artifacts
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: ${{ env.DESKTOP_MACOS_ARTIFACT_NAME }}
                  path: ${{ env.MACOS_RELEASE_ASSET_DIR }}/*
                  compression-level: ${{ env.MACOS_ARTIFACT_COMPRESSION_LEVEL }}
                  if-no-files-found: ${{ env.ARTIFACT_MISSING_FILE_BEHAVIOR }}

    assemble-release:
        needs:
            - build
            - resume-macos-notarization
        if: >-
            !cancelled() &&
            ((github.event_name == 'push' && needs.build.result == 'success') ||
            (github.event_name == 'workflow_dispatch' && needs['resume-macos-notarization'].result == 'success'))
        runs-on: ubuntu-latest
        environment: desktop-release-signing
        permissions:
            actions: read
            contents: read
        outputs:
            make_latest: ${{ steps.release-metadata.outputs.make_latest }}
            prerelease: ${{ steps.release-metadata.outputs.prerelease }}

        steps:
            - name: Checkout release tag
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
              with:
                  persist-credentials: false

            - name: Setup Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version-file: package.json

            - name: Prepare release metadata
              id: release-metadata
              run: node ./scripts/build/desktop-release-admission.mjs metadata

            - name: Download Linux artifacts from tag run
              if: github.event_name == 'push'
              uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
              with:
                  name: ${{ env.DESKTOP_LINUX_ARTIFACT_NAME }}
                  path: release-assets

            - name: Download macOS artifacts from tag run
              if: github.event_name == 'push'
              uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
              with:
                  name: ${{ env.DESKTOP_MACOS_ARTIFACT_NAME }}
                  path: release-assets

            - name: Download Linux artifacts from source tag run
              if: github.event_name == 'workflow_dispatch'
              uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
              with:
                  name: ${{ env.DESKTOP_LINUX_ARTIFACT_NAME }}
                  path: release-assets
                  github-token: ${{ github.token }}
                  run-id: ${{ inputs.source_run_id }}

            - name: Download finalized macOS artifacts
              if: github.event_name == 'workflow_dispatch'
              uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
              with:
                  name: ${{ env.DESKTOP_MACOS_ARTIFACT_NAME }}
                  path: release-assets

            - name: Generate checksums
              shell: bash
              run: |
                  set -euo pipefail
                  cd release-assets
                  find . -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > ../SHA256SUMS.txt

            - name: Re-verify Linux bundles and sign release checksum manifest
              run: node ./scripts/build/linux-gpg-signing.mjs finalize-release release-assets SHA256SUMS.txt
              env:
                  LINUX_GPG_PRIVATE_KEY_ASC: ${{ secrets.LINUX_GPG_PRIVATE_KEY_ASC }}
                  LINUX_GPG_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
                  LINUX_GPG_KEY_ID: ${{ secrets.LINUX_GPG_KEY_ID }}
                  LINUX_GPG_OWNERTRUST: ${{ secrets.LINUX_GPG_OWNERTRUST }}

            - name: Preserve release-ready artifacts
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: ${{ env.DESKTOP_RELEASE_READY_ARTIFACT_NAME }}
                  path: |
                      release-assets/**
                      SHA256SUMS.txt
                      SHA256SUMS.txt.asc
                  retention-days: ${{ env.MACOS_NOTARIZATION_ARTIFACT_RETENTION_DAYS }}
                  if-no-files-found: ${{ env.ARTIFACT_MISSING_FILE_BEHAVIOR }}

    publish-release:
        needs: assemble-release
        if: >-
            !cancelled() &&
            needs.assemble-release.result == 'success'
        runs-on: ubuntu-latest
        environment: desktop-release-signing
        permissions:
            actions: read
            attestations: write
            contents: write
            id-token: write

        steps:
            - name: Download release-ready artifacts
              uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
              with:
                  name: ${{ env.DESKTOP_RELEASE_READY_ARTIFACT_NAME }}
                  path: .

            - name: Attest release artifacts
              uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
              with:
                  subject-path: |
                      release-assets/**/*.AppImage
                      release-assets/**/*.deb
                      release-assets/**/*.dmg
                      release-assets/**/*.app.tar.gz

            - name: Publish GitHub release
              uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
              with:
                  tag_name: ${{ github.ref_name }}
                  prerelease: ${{ needs.assemble-release.outputs.prerelease }}
                  make_latest: ${{ needs.assemble-release.outputs.make_latest }}
                  files: |
                      release-assets/**
                      SHA256SUMS.txt
                      SHA256SUMS.txt.asc
