name: Tauri Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write
    id-token: write
    attestations: write

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      rust_targets: x86_64-unknown-linux-gnu
                      node_dist_target: linux-x64
                      bundles: appimage,deb
                      artifact_name: artgod-linux-x64
                    - os: windows-latest
                      target: x86_64-pc-windows-msvc
                      rust_targets: x86_64-pc-windows-msvc
                      node_dist_target: win-x64
                      bundles: nsis
                      artifact_name: artgod-windows-x64
                    - os: macos-latest
                      target: universal-apple-darwin
                      rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
                      node_dist_target: darwin-universal
                      bundles: dmg
                      artifact_name: artgod-macos-universal

        runs-on: ${{ matrix.os }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24.3.0

            - name: Enable Corepack
              run: corepack enable

            - name: Cache Yarn local artifacts
              uses: actions/cache@v4
              with:
                  path: |
                      .yarn/cache
                      .yarn/unplugged
                      .cache/desktop-node-runtime
                      .cache/desktop-nats-runtime
                  key: ${{ runner.os }}-yarn-local-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}
                  restore-keys: |
                      ${{ runner.os }}-yarn-local-

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: 1.93.1
                  targets: ${{ matrix.rust_targets }}

            - name: Install Linux build dependencies
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                      libwebkit2gtk-4.1-dev \
                      libgtk-3-dev \
                      libayatana-appindicator3-dev \
                      librsvg2-dev \
                      patchelf

            - name: Install workspace dependencies
              env:
                  YARN_ENABLE_SCRIPTS: true
              run: yarn install --immutable

            - name: Check desktop runtime registry consistency
              run: yarn check:runtime-registry

            - name: Validate macOS signing and notarization secrets
              if: runner.os == 'macOS'
              shell: bash
              run: |
                  set -euo pipefail
                  missing=0
                  for key in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_API_KEY_P8_B64 APPLE_API_KEY_ID APPLE_API_ISSUER; do
                    if [ -z "${!key:-}" ]; then
                      echo "Missing required secret: $key"
                      missing=1
                    fi
                  done
                  if [ "$missing" -ne 0 ]; then
                    exit 1
                  fi
              env:
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
                  APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8_B64 }}
                  APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
                  APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

            - name: Prepare macOS signing keychain
              if: runner.os == 'macOS'
              shell: bash
              run: |
                  set -euo pipefail
                  CERT_PATH="$RUNNER_TEMP/apple-signing-cert.p12"
                  KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
                  KEYCHAIN_PATH="$RUNNER_TEMP/artgod-build.keychain-db"
                  KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"

                  echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
                  echo "$APPLE_API_KEY_P8_B64" | base64 --decode > "$KEY_PATH"

                  security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
                  security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
                  security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
                  security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -A
                  security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
                  security list-keychains -d user -s "$KEYCHAIN_PATH"
                  security default-keychain -d user -s "$KEYCHAIN_PATH"

                  echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
                  echo "APPLE_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
                  echo "APPLE_KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"
              env:
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8_B64 }}
                  APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}

            - name: Select Windows signing backend
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  $trustedSigningSecrets = @(
                    "AZURE_ARTIFACT_SIGNING_ENDPOINT",
                    "AZURE_ARTIFACT_SIGNING_ACCOUNT",
                    "AZURE_ARTIFACT_SIGNING_CERT_PROFILE",
                    "AZURE_CLIENT_ID",
                    "AZURE_CLIENT_SECRET",
                    "AZURE_TENANT_ID"
                  )
                  $pfxSecrets = @("WINDOWS_CERT_PFX_B64", "WINDOWS_CERT_PASSWORD")

                  $trustedReady = $true
                  foreach ($key in $trustedSigningSecrets) {
                    if ([string]::IsNullOrWhiteSpace((Get-Item -Path "Env:$key" -ErrorAction SilentlyContinue).Value)) {
                      $trustedReady = $false
                    }
                  }

                  $pfxReady = $true
                  foreach ($key in $pfxSecrets) {
                    if ([string]::IsNullOrWhiteSpace((Get-Item -Path "Env:$key" -ErrorAction SilentlyContinue).Value)) {
                      $pfxReady = $false
                    }
                  }

                  if ($trustedReady) {
                    "WINDOWS_SIGNING_BACKEND=artifact-signing" | Out-File -FilePath $env:GITHUB_ENV -Append
                  } elseif ($pfxReady) {
                    "WINDOWS_SIGNING_BACKEND=pfx" | Out-File -FilePath $env:GITHUB_ENV -Append
                  } else {
                    throw "Missing Windows signing secrets. Provide Azure Artifact Signing secrets, or WINDOWS_CERT_PFX_B64 and WINDOWS_CERT_PASSWORD."
                  }
              env:
                  AZURE_ARTIFACT_SIGNING_ENDPOINT: ${{ secrets.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
                  AZURE_ARTIFACT_SIGNING_ACCOUNT: ${{ secrets.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
                  AZURE_ARTIFACT_SIGNING_CERT_PROFILE: ${{ secrets.AZURE_ARTIFACT_SIGNING_CERT_PROFILE }}
                  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
                  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
                  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
                  WINDOWS_CERT_PFX_B64: ${{ secrets.WINDOWS_CERT_PFX_B64 }}
                  WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}

            - name: Install Azure Artifact Signing CLI
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  if ($env:WINDOWS_SIGNING_BACKEND -ne "artifact-signing") {
                    Write-Host "Skipping Azure Artifact Signing CLI install."
                    exit 0
                  }
                  cargo install artifact-signing-cli --locked

            - name: Prepare Windows Azure Artifact Signing config
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  if ($env:WINDOWS_SIGNING_BACKEND -ne "artifact-signing") {
                    Write-Host "Skipping Azure Artifact Signing config."
                    exit 0
                  }
                  $config = @{
                    bundle = @{
                      windows = @{
                        signCommand = "trusted-signing-cli -e $env:AZURE_ARTIFACT_SIGNING_ENDPOINT -a $env:AZURE_ARTIFACT_SIGNING_ACCOUNT -c $env:AZURE_ARTIFACT_SIGNING_CERT_PROFILE -d ArtGod %1"
                      }
                    }
                  } | ConvertTo-Json -Depth 4
                  $config | Out-File -FilePath src-tauri/tauri.windows.signing.conf.json -Encoding utf8
              env:
                  AZURE_ARTIFACT_SIGNING_ENDPOINT: ${{ secrets.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
                  AZURE_ARTIFACT_SIGNING_ACCOUNT: ${{ secrets.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
                  AZURE_ARTIFACT_SIGNING_CERT_PROFILE: ${{ secrets.AZURE_ARTIFACT_SIGNING_CERT_PROFILE }}

            - name: Prepare Windows PFX signing certificate
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  if ($env:WINDOWS_SIGNING_BACKEND -ne "pfx") {
                    Write-Host "Skipping Windows PFX signing config."
                    exit 0
                  }
                  $pfxPath = Join-Path $env:RUNNER_TEMP "artgod-signing-cert.pfx"
                  [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_CERT_PFX_B64))

                  $securePassword = ConvertTo-SecureString -String $env:WINDOWS_CERT_PASSWORD -AsPlainText -Force
                  $importedCert = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword -Exportable

                  $thumbprint = $env:WINDOWS_CERT_SHA1
                  if ([string]::IsNullOrWhiteSpace($thumbprint)) {
                    if (-not $importedCert) {
                      throw "Could not determine certificate thumbprint"
                    }
                    $thumbprint = $importedCert.Thumbprint
                  }
                  $thumbprint = $thumbprint -replace '\s', ''

                  $config = @{
                    bundle = @{
                      windows = @{
                        certificateThumbprint = $thumbprint
                      }
                    }
                  } | ConvertTo-Json -Depth 4
                  $config | Out-File -FilePath src-tauri/tauri.windows.signing.conf.json -Encoding utf8
              env:
                  WINDOWS_CERT_PFX_B64: ${{ secrets.WINDOWS_CERT_PFX_B64 }}
                  WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
                  WINDOWS_CERT_SHA1: ${{ secrets.WINDOWS_CERT_SHA1 }}

            - name: Build Tauri bundle
              if: runner.os != 'Windows'
              env:
                  DESKTOP_NODE_DIST_TARGET: ${{ matrix.node_dist_target }}
                  DESKTOP_NATS_DIST_TARGET: ${{ matrix.node_dist_target }}
                  APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
              run: yarn tauri build --ci --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

            - name: Build signed Tauri bundle
              if: runner.os == 'Windows'
              env:
                  DESKTOP_NODE_DIST_TARGET: ${{ matrix.node_dist_target }}
                  DESKTOP_NATS_DIST_TARGET: ${{ matrix.node_dist_target }}
                  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
                  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
                  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
              run: yarn tauri build --ci --target ${{ matrix.target }} --bundles ${{ matrix.bundles }} --config src-tauri/tauri.windows.signing.conf.json

            - name: Verify bundled Yarn runtime dependencies
              shell: bash
              run: |
                  set -euo pipefail
                  test -d src-tauri/resources/runtime/.yarn/cache
                  test -d src-tauri/resources/runtime/.yarn/unplugged
                  test -f src-tauri/resources/runtime/.yarn/install-state.gz
                  test -f src-tauri/resources/runtime/.pnp.cjs
                  test -f src-tauri/resources/runtime/.pnp.loader.mjs
                  if [ "${{ runner.os }}" = "Windows" ]; then
                    test -f src-tauri/resources/runtime/node/node.exe
                    test -f src-tauri/resources/runtime/nats/nats-server.exe
                  else
                    test -f src-tauri/resources/runtime/node/node
                    test -f src-tauri/resources/runtime/nats/nats-server
                  fi

            - name: Verify macOS code signing
              if: runner.os == 'macOS'
              shell: bash
              run: |
                  set -euo pipefail
                  APP_PATH="$(find "src-tauri/target/${{ matrix.target }}/release/bundle/macos" -maxdepth 1 -type d -name "*.app" | head -n 1)"
                  if [ -z "$APP_PATH" ]; then
                    echo "No .app bundle found for code-sign verification"
                    exit 1
                  fi
                  codesign --verify --deep --strict --verbose=2 "$APP_PATH"

            - name: Collect release artifacts
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p release-assets
                  find "src-tauri/target/${{ matrix.target }}/release/bundle" -type f \
                    \( -name "*.AppImage" -o -name "*.deb" -o -name "*.dmg" -o -name "*.msi" -o -name "*.exe" -o -name "*.app.tar.gz" \) \
                    -exec cp {} release-assets/ \;
                  if [ -z "$(ls -A release-assets)" ]; then
                    echo "No bundle artifacts found"
                    exit 1
                  fi

            - name: Notarize and staple macOS DMG
              if: runner.os == 'macOS'
              shell: bash
              run: |
                  set -euo pipefail
                  DMG_PATH="$(find release-assets -maxdepth 1 -type f -name "*.dmg" | head -n 1)"
                  if [ -z "$DMG_PATH" ]; then
                    echo "No DMG artifact found for notarization"
                    exit 1
                  fi

                  xcrun notarytool submit "$DMG_PATH" \
                    --key "$APPLE_API_KEY_PATH" \
                    --key-id "$APPLE_API_KEY_ID" \
                    --issuer "$APPLE_API_ISSUER" \
                    --wait

                  xcrun stapler staple "$DMG_PATH"
                  xcrun stapler validate "$DMG_PATH"
                  spctl --assess --type open --context context:primary-signature --verbose=4 "$DMG_PATH"
              env:
                  APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
                  APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

            - name: Validate Linux signing secrets
              if: runner.os == 'Linux'
              shell: bash
              run: |
                  set -euo pipefail
                  missing=0
                  for key in LINUX_GPG_PRIVATE_KEY_ASC LINUX_GPG_PASSPHRASE LINUX_GPG_KEY_ID; do
                    if [ -z "${!key:-}" ]; then
                      echo "Missing required secret: $key"
                      missing=1
                    fi
                  done
                  if [ "$missing" -ne 0 ]; then
                    exit 1
                  fi
              env:
                  LINUX_GPG_PRIVATE_KEY_ASC: ${{ secrets.LINUX_GPG_PRIVATE_KEY_ASC }}
                  LINUX_GPG_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
                  LINUX_GPG_KEY_ID: ${{ secrets.LINUX_GPG_KEY_ID }}

            - name: Sign Linux artifacts with GPG
              if: runner.os == 'Linux'
              shell: bash
              run: |
                  set -euo pipefail
                  export GNUPGHOME="$RUNNER_TEMP/gnupg"
                  mkdir -p "$GNUPGHOME"
                  chmod 700 "$GNUPGHOME"

                  echo "$LINUX_GPG_PRIVATE_KEY_ASC" | gpg --batch --import
                  if [ -n "${LINUX_GPG_OWNERTRUST:-}" ]; then
                    echo "$LINUX_GPG_OWNERTRUST" | gpg --batch --import-ownertrust
                  fi

                  shopt -s nullglob
                  files=(release-assets/*.AppImage release-assets/*.deb)
                  if [ "${#files[@]}" -eq 0 ]; then
                    echo "No Linux artifacts found to sign"
                    exit 1
                  fi

                  for file in "${files[@]}"; do
                    gpg --batch --yes --pinentry-mode loopback \
                      --passphrase "$LINUX_GPG_PASSPHRASE" \
                      --local-user "$LINUX_GPG_KEY_ID" \
                      --armor --detach-sign "$file"
                    gpg --batch --verify "${file}.asc" "$file"
                  done
              env:
                  LINUX_GPG_PRIVATE_KEY_ASC: ${{ secrets.LINUX_GPG_PRIVATE_KEY_ASC }}
                  LINUX_GPG_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
                  LINUX_GPG_KEY_ID: ${{ secrets.LINUX_GPG_KEY_ID }}
                  LINUX_GPG_OWNERTRUST: ${{ secrets.LINUX_GPG_OWNERTRUST }}

            - name: Verify Windows Authenticode signatures
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  $signtool = (Get-Command signtool.exe -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty Source)
                  if (-not $signtool) {
                    $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
                      Sort-Object FullName -Descending |
                      Select-Object -First 1 -ExpandProperty FullName)
                  }
                  if (-not $signtool) {
                    throw "signtool.exe was not found on runner"
                  }

                  $artifacts = Get-ChildItem release-assets -File | Where-Object { $_.Extension -in @('.exe', '.msi') }
                  if (-not $artifacts) {
                    throw "No Windows artifacts found for signature verification"
                  }

                  foreach ($artifact in $artifacts) {
                    & $signtool verify /pa /v $artifact.FullName
                    if ($LASTEXITCODE -ne 0) {
                      throw "Signature verification failed for $($artifact.FullName)"
                    }
                  }

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact_name }}
                  path: release-assets/*

    release:
        needs: build
        runs-on: ubuntu-latest

        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: release-assets

            - name: Generate checksums
              shell: bash
              run: |
                  set -euo pipefail
                  find release-assets -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

            - name: Validate checksum signing secrets
              shell: bash
              run: |
                  set -euo pipefail
                  missing=0
                  for key in LINUX_GPG_PRIVATE_KEY_ASC LINUX_GPG_PASSPHRASE LINUX_GPG_KEY_ID; do
                    if [ -z "${!key:-}" ]; then
                      echo "Missing required secret: $key"
                      missing=1
                    fi
                  done
                  if [ "$missing" -ne 0 ]; then
                    exit 1
                  fi
              env:
                  LINUX_GPG_PRIVATE_KEY_ASC: ${{ secrets.LINUX_GPG_PRIVATE_KEY_ASC }}
                  LINUX_GPG_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
                  LINUX_GPG_KEY_ID: ${{ secrets.LINUX_GPG_KEY_ID }}

            - name: Sign checksums with GPG
              shell: bash
              run: |
                  set -euo pipefail
                  export GNUPGHOME="$RUNNER_TEMP/gnupg"
                  mkdir -p "$GNUPGHOME"
                  chmod 700 "$GNUPGHOME"

                  echo "$LINUX_GPG_PRIVATE_KEY_ASC" | gpg --batch --import
                  if [ -n "${LINUX_GPG_OWNERTRUST:-}" ]; then
                    echo "$LINUX_GPG_OWNERTRUST" | gpg --batch --import-ownertrust
                  fi

                  gpg --batch --yes --pinentry-mode loopback \
                    --passphrase "$LINUX_GPG_PASSPHRASE" \
                    --local-user "$LINUX_GPG_KEY_ID" \
                    --armor --detach-sign SHA256SUMS.txt
                  gpg --batch --verify SHA256SUMS.txt.asc SHA256SUMS.txt
              env:
                  LINUX_GPG_PRIVATE_KEY_ASC: ${{ secrets.LINUX_GPG_PRIVATE_KEY_ASC }}
                  LINUX_GPG_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
                  LINUX_GPG_KEY_ID: ${{ secrets.LINUX_GPG_KEY_ID }}
                  LINUX_GPG_OWNERTRUST: ${{ secrets.LINUX_GPG_OWNERTRUST }}

            - name: Publish GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      release-assets/**
                      SHA256SUMS.txt
                      SHA256SUMS.txt.asc

            - name: Attest release artifacts
              uses: actions/attest-build-provenance@v2
              with:
                  subject-path: |
                      release-assets/**/*.AppImage
                      release-assets/**/*.deb
                      release-assets/**/*.dmg
                      release-assets/**/*.msi
                      release-assets/**/*.exe
                      release-assets/**/*.app.tar.gz
