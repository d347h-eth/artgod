name: Tauri Build Check

on:
    pull_request:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read

jobs:
    tauri-check:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
              with:
                  persist-credentials: false

            - name: Setup Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version: 24.3.0

            - name: Enable Corepack
              run: corepack enable

            - name: Check project version consistency
              run: node ./scripts/build/sync-version.mjs --check

            - name: Cache Yarn local artifacts
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
              with:
                  path: |
                      .yarn/cache
                      .yarn/unplugged
                      .cache/desktop-node-runtime
                      .cache/desktop-nats-runtime
                  key: ${{ runner.os }}-yarn-local-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}
                  restore-keys: |
                      ${{ runner.os }}-yarn-local-

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-07-10
              with:
                  toolchain: 1.93.1

            - name: Install Linux build dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                      libwebkit2gtk-4.1-dev \
                      libgtk-3-dev \
                      libayatana-appindicator3-dev \
                      librsvg2-dev \
                      python3 \
                      make \
                      g++

            - name: Install workspace dependencies
              run: yarn install --immutable

            - name: Build trusted native SQLite dependency
              run: yarn build:sqlite-native

            - name: Check desktop runtime registry consistency
              run: yarn check:runtime-registry

            - name: Test desktop release security
              run: yarn test:desktop:release

            - name: Tauri no-bundle build check
              env:
                  DESKTOP_NODE_DIST_TARGET: linux-x64
                  DESKTOP_NATS_DIST_TARGET: linux-x64
              run: yarn tauri build --debug --no-bundle --ci

            - name: Test Admin WebView shell ACL
              run: cargo test --manifest-path src-tauri/Cargo.toml --test webview_capability_security

            - name: Test bot hard-parent-death containment
              run: yarn test:desktop:parent-containment

            - name: Verify bundled Yarn runtime dependencies
              shell: bash
              run: |
                  set -euo pipefail
                  test -d src-tauri/resources/runtime/.yarn/cache
                  test -d src-tauri/resources/runtime/.yarn/unplugged
                  test -f src-tauri/resources/runtime/.yarn/install-state.gz
                  test -f src-tauri/resources/runtime/.pnp.cjs
                  test -f src-tauri/resources/runtime/.pnp.loader.mjs
                  test -f src-tauri/resources/runtime/node/node
                  test -f src-tauri/resources/runtime/nats/nats-server

    windows-containment-check:
        runs-on: windows-latest
        env:
            CARGO_BUILD_TARGET: x86_64-pc-windows-msvc

        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
              with:
                  persist-credentials: false

            - name: Setup Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version-file: package.json

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-07-10
              with:
                  toolchain: 1.93.1
                  targets: ${{ env.CARGO_BUILD_TARGET }}

            - name: Prepare Windows secret prompt sidecar
              run: node ./scripts/build/prepare-desktop-sidecars.mjs --profile debug

            - name: Check Windows Job Object containment
              run: cargo check --manifest-path src-tauri/Cargo.toml --lib
