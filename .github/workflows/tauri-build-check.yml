name: Tauri Build Check

on:
    pull_request:
    workflow_dispatch:

jobs:
    tauri-check:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24.3.0

            - name: Enable Corepack
              run: corepack enable

            - name: Cache Yarn local artifacts
              uses: actions/cache@v4
              with:
                  path: |
                      .yarn/cache
                      .yarn/unplugged
                  key: ${{ runner.os }}-yarn-local-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}
                  restore-keys: |
                      ${{ runner.os }}-yarn-local-

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Install Linux build dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                      libwebkit2gtk-4.1-dev \
                      libgtk-3-dev \
                      libayatana-appindicator3-dev \
                      librsvg2-dev

            - name: Install workspace dependencies
              env:
                  YARN_ENABLE_SCRIPTS: true
              run: yarn install --immutable

            - name: Check desktop runtime registry consistency
              run: yarn check:runtime-registry

            - name: Tauri no-bundle build check
              run: yarn tauri build --debug --no-bundle --ci

            - name: Verify bundled Yarn runtime dependencies
              shell: bash
              run: |
                  set -euo pipefail
                  test -d src-tauri/resources/runtime/.yarn/cache
                  test -d src-tauri/resources/runtime/.yarn/unplugged
                  test -f src-tauri/resources/runtime/.yarn/install-state.gz
                  test -f src-tauri/resources/runtime/.pnp.cjs
                  test -f src-tauri/resources/runtime/.pnp.loader.mjs
