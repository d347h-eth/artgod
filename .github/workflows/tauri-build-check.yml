name: Tauri Build Check

on:
    pull_request:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read

jobs:
    tauri-check:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
              with:
                  persist-credentials: false

            - name: Setup Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version: 24.3.0

            - name: Enable Corepack
              run: corepack enable

            - name: Check project version consistency
              run: node ./scripts/build/sync-version.mjs --check

            - name: Cache Yarn local artifacts
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
              with:
                  path: |
                      .yarn/cache
                      .yarn/unplugged
                      .cache/desktop-node-runtime
                      .cache/desktop-nats-runtime
                  key: ${{ runner.os }}-yarn-local-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}
                  restore-keys: |
                      ${{ runner.os }}-yarn-local-

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-07-10
              with:
                  toolchain: 1.93.1

            - name: Install Linux build dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                      libwebkit2gtk-4.1-dev \
                      libgtk-3-dev \
                      libayatana-appindicator3-dev \
                      librsvg2-dev \
                      python3 \
                      make \
                      g++

            - name: Install workspace dependencies
              run: yarn install --immutable

            - name: Build trusted native SQLite dependency
              run: yarn build:sqlite-native

            - name: Check desktop runtime registry consistency
              run: yarn check:runtime-registry

            - name: Test desktop release security
              run: yarn test:desktop:release

            - name: Test desktop Admin manifest
              run: yarn test:desktop:admin-manifest

            - name: Test desktop listener boundaries
              run: yarn test:desktop:listener-boundaries

            - name: Test sensitive process hardening
              run: yarn test:desktop:sensitive-process

            - name: Test Admin WebView shell ACL
              run: cargo test --manifest-path src-tauri/Cargo.toml --test webview_capability_security

            - name: Test Linux runtime resource layout
              run: cargo test --manifest-path src-tauri/Cargo.toml --test linux_runtime_resource_layout

            - name: Test desktop parent containment
              run: yarn test:desktop:parent-containment

            - name: Test Tauri runtime output reconciliation
              run: cargo test --manifest-path src-tauri/Cargo.toml --locked --offline --test tauri_runtime_output_reconciliation

            - name: Tauri no-bundle build check
              env:
                  DESKTOP_NODE_DIST_TARGET: linux-x64
                  DESKTOP_NATS_DIST_TARGET: linux-x64
              run: yarn build:desktop:no-bundle --debug

            - name: Verify staged desktop runtime resources
              run: yarn check:desktop-runtime-resources

            - name: Verify no-bundle desktop runtime output
              run: yarn check:desktop-no-bundle-runtime

    macos-prompt-containment-check:
        runs-on: macos-latest

        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
              with:
                  persist-credentials: false

            - name: Setup Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version-file: package.json

            - name: Enable Corepack
              run: corepack enable

            - name: Cache Yarn local artifacts
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
              with:
                  path: |
                      .yarn/cache
                      .yarn/unplugged
                      .cache/desktop-node-runtime
                      .cache/desktop-nats-runtime
                  key: ${{ runner.os }}-yarn-local-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}
                  restore-keys: |
                      ${{ runner.os }}-yarn-local-

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-07-10
              with:
                  toolchain: 1.93.1

            - name: Install workspace dependencies
              run: yarn install --immutable --mode=skip-build

            - name: Build universal macOS SQLite dependency
              run: node ./scripts/build/verify-macos-universal-sqlite-build.mjs

            - name: Fetch macOS root Cargo dependencies
              run: cargo fetch --manifest-path src-tauri/Cargo.toml --locked

            - name: Test desktop listener boundaries
              run: yarn test:desktop:listener-boundaries

            - name: Build macOS userland frontend
              run: yarn build:userland

            - name: Build macOS desktop runtime
              run: yarn build:desktop-runtime

            - name: Stage macOS desktop runtime resources
              run: yarn build:desktop-runtime-resources

            - name: Verify staged desktop runtime resources
              run: yarn check:desktop-runtime-resources

            - name: Prepare macOS secret prompt sidecar
              run: node ./scripts/build/prepare-desktop-sidecars.mjs --profile debug

            - name: Test secret prompt parent containment
              run: yarn test:desktop:secret-prompt-parent-containment

    windows-containment-check:
        runs-on: windows-latest
        env:
            CARGO_BUILD_TARGET: x86_64-pc-windows-msvc

        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
              with:
                  persist-credentials: false

            - name: Setup Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version-file: package.json

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-07-10
              with:
                  toolchain: 1.93.1
                  targets: ${{ env.CARGO_BUILD_TARGET }}

            - name: Prepare Windows secret prompt sidecar
              run: node ./scripts/build/prepare-desktop-sidecars.mjs --profile debug

            - name: Check Windows sensitive-process hardening
              run: cargo check --manifest-path src-tauri/Cargo.toml --lib
