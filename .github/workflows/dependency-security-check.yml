name: Dependency Security Check

on:
    pull_request:
        paths:
            - ".github/workflows/dependency-security-check.yml"
            - ".yarnrc.yml"
            - "config/cargo-age-gate.json"
            - "package.json"
            - "scripts/security/cargo-*.mjs"
            - "src-tauri/Cargo.lock"
            - "src-tauri/Cargo.toml"
            - "yarn.lock"
            - "*/package.json"
    push:
        branches:
            - main
        paths:
            - ".github/workflows/dependency-security-check.yml"
            - ".yarnrc.yml"
            - "config/cargo-age-gate.json"
            - "package.json"
            - "scripts/security/cargo-*.mjs"
            - "src-tauri/Cargo.lock"
            - "src-tauri/Cargo.toml"
            - "yarn.lock"
            - "*/package.json"
    workflow_dispatch:

permissions:
    contents: read

jobs:
    yarn-security:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
              with:
                  persist-credentials: false

            - name: Setup Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version-file: package.json

            - name: Enable Corepack
              run: corepack enable

            - name: Cache Yarn local artifacts
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
              with:
                  path: |
                      .yarn/cache
                      .yarn/unplugged
                  key: ${{ runner.os }}-yarn-security-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}
                  restore-keys: |
                      ${{ runner.os }}-yarn-security-

            - name: Prepare Yarn project state for security aliases
              run: yarn install --immutable --mode=skip-build

            - name: Verify Yarn lockfile metadata
              run: yarn security:yarn:verify-lockfile

            - name: Audit Node dependency advisories
              run: yarn security:yarn:audit

    cargo-age-gate:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
              with:
                  persist-credentials: false

            - name: Setup Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version-file: package.json

            - name: Enable Corepack
              run: corepack enable

            - name: Prepare Yarn project state for security aliases
              run: yarn install --immutable --mode=skip-build

            - name: Check Cargo dependency age gate
              run: yarn cargo:age-gate
