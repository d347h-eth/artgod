name: Tauri Reproducibility Check

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    contents: read

jobs:
    linux-unsigned-parity:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
              with:
                  persist-credentials: false

            - name: Setup Node
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
              with:
                  node-version: 24.3.0

            - name: Enable Corepack
              run: corepack enable

            - name: Cache Yarn local artifacts
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
              with:
                  path: |
                      .yarn/cache
                      .yarn/unplugged
                      .cache/desktop-node-runtime
                      .cache/desktop-nats-runtime
                  key: ${{ runner.os }}-yarn-local-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}
                  restore-keys: |
                      ${{ runner.os }}-yarn-local-

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-07-10
              with:
                  toolchain: 1.93.1
                  targets: x86_64-unknown-linux-gnu

            - name: Install Linux build dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                      libwebkit2gtk-4.1-dev \
                      libgtk-3-dev \
                      libayatana-appindicator3-dev \
                      librsvg2-dev \
                      python3 \
                      make \
                      g++

            - name: Install workspace dependencies
              run: yarn install --immutable

            - name: Build trusted native SQLite dependency
              run: yarn build:sqlite-native

            - name: Check desktop runtime registry consistency
              run: yarn check:runtime-registry

            - name: Build unsigned binary (pass A)
              shell: bash
              env:
                  DESKTOP_NODE_DIST_TARGET: linux-x64
                  DESKTOP_NATS_DIST_TARGET: linux-x64
              run: |
                  set -euo pipefail
                  yarn clean:build
                  yarn tauri build --ci --target x86_64-unknown-linux-gnu --no-bundle

                  BIN_PATH="src-tauri/target/x86_64-unknown-linux-gnu/release/artgod-desktop"
                  if [ ! -f "$BIN_PATH" ]; then
                    echo "Expected binary not found at $BIN_PATH"
                    exit 1
                  fi

                  mkdir -p repro-output
                  sha256sum "$BIN_PATH" > repro-output/manifest-a.txt
                  cp "$BIN_PATH" repro-output/artgod-desktop-a

            - name: Build unsigned binary (pass B)
              shell: bash
              env:
                  DESKTOP_NODE_DIST_TARGET: linux-x64
                  DESKTOP_NATS_DIST_TARGET: linux-x64
              run: |
                  set -euo pipefail
                  yarn clean:build
                  yarn tauri build --ci --target x86_64-unknown-linux-gnu --no-bundle

                  BIN_PATH="src-tauri/target/x86_64-unknown-linux-gnu/release/artgod-desktop"
                  if [ ! -f "$BIN_PATH" ]; then
                    echo "Expected binary not found at $BIN_PATH"
                    exit 1
                  fi

                  sha256sum "$BIN_PATH" > repro-output/manifest-b.txt
                  cp "$BIN_PATH" repro-output/artgod-desktop-b

            - name: Compare unsigned build manifests
              shell: bash
              run: |
                  set -euo pipefail
                  diff -u repro-output/manifest-a.txt repro-output/manifest-b.txt

            - name: Upload reproducibility manifests
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: tauri-repro-linux-x64
                  path: |
                      repro-output/manifest-a.txt
                      repro-output/manifest-b.txt
