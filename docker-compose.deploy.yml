x-artgod-image: &artgod-image
    image: artgod-deploy:local
    build:
        context: .
        dockerfile: Dockerfile.deploy
        args:
            PUBLIC_BACKEND_ORIGIN: ${PUBLIC_BACKEND_ORIGIN}
            PUBLIC_APP_DEPLOYMENT_MODE: ${PUBLIC_APP_DEPLOYMENT_MODE:-}
            PUBLIC_APP_CHAIN_REF: ${PUBLIC_APP_CHAIN_REF:-}
            PUBLIC_APP_COLLECTION_REF: ${PUBLIC_APP_COLLECTION_REF:-}

x-artgod-log-labels: &artgod-log-labels
    com.artgod.observability.logs: "true"

x-artgod-service: &artgod-service
    <<: *artgod-image
    init: true
    restart: unless-stopped
    labels: *artgod-log-labels
    env_file:
        - .env.deploy
    environment:
        ARTGOD_WORKSPACE_ROOT: /app
    networks:
        default:
        ethereum-rpc:
    volumes:
        - artgod-data:/data

services:
    caddy:
        image: caddy:2.10
        init: true
        restart: unless-stopped
        profiles:
            - bundled-caddy
        labels: *artgod-log-labels
        depends_on:
            - frontend-web
            - backend
        env_file:
            - .env.deploy
        ports:
            - "80:80"
            - "443:443"
            - "443:443/udp"
        volumes:
            - ./Caddyfile.deploy:/etc/caddy/Caddyfile:ro
            - caddy-data:/data
            - caddy-config:/config

    nats:
        image: nats:2.10
        init: true
        restart: unless-stopped
        labels: *artgod-log-labels
        command: ["-js", "-sd", "/data", "-p", "42720", "-m", "42723"]
        volumes:
            - nats-data:/data

    frontend-web:
        <<: *artgod-service
        depends_on:
            - backend
        expose:
            - "42700"
        networks:
            default:
            public-edge:
                aliases:
                    - artgod-frontend
        command: ["node", "frontend/build-web/index.js"]
        environment:
            ARTGOD_WORKSPACE_ROOT: /app
            HOST: 0.0.0.0
            PORT: 42700
            INTERNAL_BACKEND_ORIGIN: ${INTERNAL_BACKEND_ORIGIN:-http://backend:42710}

    backend:
        <<: *artgod-service
        depends_on:
            - nats
        expose:
            - "42710"
            - "42740"
        networks:
            default:
            public-edge:
                aliases:
                    - artgod-backend
            ethereum-rpc:
        command:
            [
                "./scripts/deploy/run-node-runtime.sh",
                "backend/dist-desktop/server.mjs",
            ]
        environment:
            ARTGOD_WORKSPACE_ROOT: /app
            BACKEND_HOST: 0.0.0.0

    indexer-scheduler-worker:
        <<: *artgod-service
        depends_on:
            - nats
        command:
            [
                "./scripts/deploy/run-node-runtime.sh",
                "indexer/dist-desktop/scheduler-worker.mjs",
            ]

    indexer-sync-worker:
        <<: *artgod-service
        depends_on:
            - nats
        command:
            [
                "./scripts/deploy/run-node-runtime.sh",
                "indexer/dist-desktop/sync-worker.mjs",
            ]

    indexer-reorg-worker:
        <<: *artgod-service
        depends_on:
            - nats
        command:
            [
                "./scripts/deploy/run-node-runtime.sh",
                "indexer/dist-desktop/reorg-worker.mjs",
            ]

    indexer-domain-worker:
        <<: *artgod-service
        depends_on:
            - nats
        command:
            [
                "./scripts/deploy/run-node-runtime.sh",
                "indexer/dist-desktop/domain-worker.mjs",
            ]

    indexer-bootstrap-worker:
        <<: *artgod-service
        depends_on:
            - nats
        command:
            [
                "./scripts/deploy/run-node-runtime.sh",
                "indexer/dist-desktop/bootstrap-worker.mjs",
            ]

    indexer-collection-extension-worker:
        <<: *artgod-service
        depends_on:
            - nats
        command:
            [
                "./scripts/deploy/run-node-runtime.sh",
                "indexer/dist-desktop/collection-extension-worker.mjs",
            ]

    indexer-offchain-ingest-worker:
        <<: *artgod-service
        depends_on:
            - nats
        command:
            [
                "./scripts/deploy/run-node-runtime.sh",
                "indexer/dist-desktop/offchain-ingest-worker.mjs",
            ]

    indexer-opensea-stream-worker:
        <<: *artgod-service
        depends_on:
            - nats
        command:
            [
                "./scripts/deploy/run-node-runtime.sh",
                "indexer/dist-desktop/opensea-stream-worker.mjs",
            ]

    indexer-opensea-bootstrap-worker:
        <<: *artgod-service
        depends_on:
            - nats
        command:
            [
                "./scripts/deploy/run-node-runtime.sh",
                "indexer/dist-desktop/opensea-bootstrap-worker.mjs",
            ]

    indexer-opensea-reconcile-worker:
        <<: *artgod-service
        depends_on:
            - nats
        command:
            [
                "./scripts/deploy/run-node-runtime.sh",
                "indexer/dist-desktop/opensea-reconcile-worker.mjs",
            ]

    indexer-opensea-reconcile-scheduler-worker:
        <<: *artgod-service
        depends_on:
            - nats
        command:
            [
                "./scripts/deploy/run-node-runtime.sh",
                "indexer/dist-desktop/opensea-reconcile-scheduler-worker.mjs",
            ]

    indexer-dead-letter-worker:
        <<: *artgod-service
        depends_on:
            - nats
        command:
            [
                "./scripts/deploy/run-node-runtime.sh",
                "indexer/dist-desktop/dead-letter-worker.mjs",
            ]

    loki:
        image: grafana/loki:3.0.0
        init: true
        restart: unless-stopped
        profiles:
            - observability
        command: ["-config.file=/etc/loki/config.yaml"]
        expose:
            - "42730"
        volumes:
            - ./observability/loki/loki-config.yaml:/etc/loki/config.yaml:ro
            - loki-data:/loki

    tempo:
        image: grafana/tempo:2.7.1
        init: true
        restart: unless-stopped
        profiles:
            - observability
        command: ["-config.file=/etc/tempo/config.yaml"]
        expose:
            - "42731"
            - "42732"
        volumes:
            - ./observability/tempo/tempo-config.yaml:/etc/tempo/config.yaml:ro
            - tempo-data:/var/tempo

    pyroscope:
        image: grafana/pyroscope:latest
        init: true
        restart: unless-stopped
        profiles:
            - observability
        command: ["-server.http-listen-port=42733"]
        expose:
            - "42733"
        volumes:
            - pyroscope-data:/var/lib/pyroscope

    alloy:
        image: grafana/alloy:latest
        init: true
        restart: unless-stopped
        profiles:
            - observability
        command:
            [
                "run",
                "--server.http.listen-addr=0.0.0.0:42736",
                "/etc/alloy/config.alloy",
            ]
        depends_on:
            - loki
        volumes:
            - ./observability/alloy/deploy-config.alloy:/etc/alloy/config.alloy:ro
            - /var/run/docker.sock:/var/run/docker.sock:ro

    prometheus:
        image: prom/prometheus:v2.54.1
        init: true
        restart: unless-stopped
        profiles:
            - observability
        command:
            [
                "--config.file=/etc/prometheus/prometheus.yml",
                "--web.listen-address=0.0.0.0:42734",
            ]
        expose:
            - "42734"
        volumes:
            - ./observability/prometheus/deploy-prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus-data:/prometheus

    grafana:
        image: grafana/grafana:latest
        init: true
        restart: unless-stopped
        profiles:
            - observability
        depends_on:
            - loki
            - prometheus
            - tempo
            - pyroscope
        ports:
            - "${OBSERVABILITY_GRAFANA_HOST_BIND_IP:-127.0.0.1}:${OBSERVABILITY_GRAFANA_HOST_BIND_PORT:-42735}:42735"
        expose:
            - "42735"
        networks:
            default:
        environment:
            GF_SERVER_HTTP_ADDR: 0.0.0.0
            GF_SERVER_HTTP_PORT: "42735"
            GF_SECURITY_ADMIN_USER: ${OBSERVABILITY_GRAFANA_ADMIN_USER:-admin}
            GF_SECURITY_ADMIN_PASSWORD: ${OBSERVABILITY_GRAFANA_ADMIN_PASSWORD:-change-me}
            GF_USERS_ALLOW_SIGN_UP: "false"
        volumes:
            - grafana-data:/var/lib/grafana
            - ./observability/grafana/provisioning-deploy/datasources:/etc/grafana/provisioning/datasources:ro
            - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro

    natsbox:
        image: natsio/nats-box:latest
        profiles:
            - debug
        command: ["sleep", "infinity"]

volumes:
    artgod-data:
    nats-data:
    caddy-data:
    caddy-config:
    loki-data:
    tempo-data:
    pyroscope-data:
    prometheus-data:
    grafana-data:

networks:
    public-edge:
        name: ${PUBLIC_EDGE_NETWORK:-public-edge}
        external: true
    ethereum-rpc:
        name: ${ETHEREUM_RPC_NETWORK:-ethereum-rpc}
        external: true
